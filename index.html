<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- WICHTIG: nicht auf black-translucent zurueckstellen. Auf iOS 26 macht black-translucent
     das PWA-Fenster ~60px KUERZER als den Bildschirm; der Streifen unten liegt ausserhalb des
     Fensters und ist per CSS/JS unerreichbar (Tab-Bar schwebte deshalb zu hoch). `default`
     begrenzt das Fenster auf den echten Bildschirm. Wird nur bei der INSTALLATION gelesen:
     App vom Home-Bildschirm entfernen und neu hinzufuegen, sonst greift die Aenderung nicht. -->
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Forma">
<meta name="theme-color" content="#000000">
<title>Forma</title>
<!-- Forma-Logo (Pfeile «Wachsend», Runde 3 Variante 3.4) als App-Icon: Safari «Zum Home-Bildschirm» nutzt
     apple-touch-icon, Android/Chrome das Manifest. Alles liegt flach im
     Hauptordner, damit auch ein Upload ohne Ordnerstruktur funktioniert. -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="appletouchicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon16.png">
<style>
/* ============ Design-Tokens (Spec Abschnitt 14) ============ */
:root{
  /* Grau-/Schwarztöne aus dem Apple-Fitness-Screenshot gesampelt (JB 07-11) */
  --bg:#000000; --bg2:#242426; --bg3:#38383A;
  --card:#26262A; /* Build 8: Trainingskarten im Tab-Bar-Grau (Bar-Ton rgba(46,46,50,.82) ueber Schwarz gerechnet). Bewusst deckend, damit die gezogene Wochen-Karte voll deckend bleibt (JB-Fix 07-11) */
  --l1:#FFFFFF; --l2:#8E8E93; --l3:#48484A;
  --blue:#0A84FF; --green:#30D158; --orange:#FF9F0A; --red:#FF453A;
  --green-tint:rgba(48,209,88,0.16); --red-tint:rgba(255,69,58,0.13);
  --orange-tint:rgba(255,159,10,0.16); --blue-tint:rgba(10,132,255,0.16);
  --r-btn:12px; --r-card:16px; --r-sheet:22px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',sans-serif;
}
html[data-theme="light"]{
  --bg:#F2F2F7; --bg2:#FFFFFF; --bg3:#E5E5EA;
  --card:#FFFFFF; /* Build 8: im Light Mode bleiben die Karten weiss, kein Schimmer */
  --l1:#000000; --l2:#6C6C70; --l3:#C7C7CC;
  --green-tint:rgba(48,209,88,0.20); --red-tint:rgba(255,69,58,0.15);
  --orange-tint:rgba(255,159,10,0.20); --blue-tint:rgba(10,132,255,0.20);
}
:root{--sat:env(safe-area-inset-top, 0px); --sab:env(safe-area-inset-bottom, 0px)}
html.inframe{--sat:59px; --sab:34px} /* Handy-Vorschau im iPhone-Rahmen */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--l1); font-family:var(--font);
  display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  -webkit-user-select:none; user-select:none; -webkit-text-size-adjust:100%;
  -webkit-touch-callout:none; /* kein iOS-Kontextmenü beim Drag-Halten */
  overscroll-behavior:none; /* kein Pull-to-Refresh/Gummiband im Browser-Tab */
}
button{font-family:var(--font); border:none; background:none; color:var(--l1); cursor:pointer}
a{color:var(--blue); text-decoration:none}

/* ============ Icons ============ */
.ico{display:inline-block; flex:none;
  -webkit-mask:var(--src) center/contain no-repeat; mask:var(--src) center/contain no-repeat;
  background:var(--l1)}
.ic-green{background:var(--green)} .ic-orange{background:var(--orange)}
.ic-blue{background:var(--blue)} .ic-red{background:var(--red)} .ic-dim{background:var(--l2)}

/* ============ Obere Leiste ============ */
#topbar{
  flex:none; display:flex; align-items:center; gap:10px;
  padding:calc(var(--sat) + 8px) 16px 8px;
}
.lbtn{
  position:relative; /* Build 8: Anker fuer die Schimmer-Kante (::after) */
  width:42px; height:42px; border-radius:12px; overflow:hidden; background:transparent;
  display:flex; align-items:center; justify-content:center; padding:0;
  transition:transform .2s ease; flex:none;
}
.lbtn:active{transform:scale(1.05)}
.applogo{width:100%; height:100%; display:block; object-fit:cover; transform:scale(1.04)}
#settingsBtn{margin-left:auto; width:42px; height:42px; border-radius:50%;
  background:var(--bg2); color:var(--l2); display:flex; align-items:center; justify-content:center;
  transition:background .2s ease; flex:none}
#settingsBtn:active{background:var(--bg3)}
#settingsBtn svg{display:block}

/* ============ Views / Layout ============ */
#main{flex:1; min-height:0; display:flex; flex-direction:column;
  padding-bottom:79.25px} /* 59.5px Bar + 19.75px Bar-Abstand: Inhalt endet an der Bar-Oberkante */
.view{display:none; flex:1; min-height:0; flex-direction:column; padding:4px 16px 12px}
.view.active{display:flex}
.vtitle{font-size:30px; font-weight:700; letter-spacing:-0.5px; line-height:1.15}
.vsub{color:var(--l2); font-size:14px; font-weight:500; margin:2px 0 12px}

/* ============ Heute: Kachel + Auto-Flip ============ */
#stage{flex:1; min-height:0; position:relative; perspective:1100px; margin-top:4px}
.daycard{
  position:absolute; inset:0; background:var(--card); border-radius:var(--r-card);
  display:flex; flex-direction:column; padding:20px;
  will-change:transform; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden; transform-origin:50% 50%;
}
/* Build 8 — Schimmer-Kante (Liquid Glass, wie Tab-Bar) auf Trainingskarten und
   App-Logo-Knoepfen: 1px feine Lichtlinie dem Rand entlang, unten am hellsten,
   seitlich auslaufend, oben keine. Gradient als Rahmen, die Maske stanzt die
   Mitte aus. pointer-events:none, damit Taps/Drags unbeeinflusst bleiben. */
/* Positions-Anker fuer die Schimmer-Kanten der kleinen Knoepfe (Build 8) */
#settingsBtn,.x-btn,.fp-plus,.confirm-btn,.checkcircle-btn,.xsquare-btn,.wstat button,.rem-btn,.circle-btn{position:relative}
/* Struktur-Regel: volle Stufe ist der Standard (Karten + App-Logo-Knoepfe) */
.daycard::after, .wrow::after, .lbtn::after, .ntc-btn::after, .ringcard::after, .pline::after,
#settingsBtn::after, #progToggle::after, .x-btn::after, .fp-plus::after, .confirm-btn::after,
.checkcircle-btn::after, .xsquare-btn::after, .wstat button::after, .rem-btn::after, .ub-remove::after, .circle-btn::after{
  content:""; position:absolute; inset:0; border-radius:inherit; padding:1px;
  background:linear-gradient(180deg,
    rgba(255,255,255,0) 0%, rgba(255,255,255,.03) 45%,
    rgba(255,255,255,.12) 72%, rgba(255,255,255,.30) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
          mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
          mask-composite:exclude;
  pointer-events:none; z-index:6}
/* Mittlere Stufe: alle X-Knoepfe (JB: etwas staerker als die leichte Stufe) */
.x-btn::after, .xsquare-btn::after, .wstat button.st-skip::after, .rem-btn.no::after, .ub-remove::after{
  background:linear-gradient(180deg,
    rgba(255,255,255,0) 0%, rgba(255,255,255,.02) 45%,
    rgba(255,255,255,.10) 72%, rgba(255,255,255,.24) 100%)}
/* Leichte Stufe: Einstellungen-Zahnrad, Fortschritt-Umschalter, Haken-Knoepfe, Plus in der
   Bibliothek, Zurueck-Kreis der Tageskachel (Build 10: einheitlich mit den anderen Knoepfen) */
#settingsBtn::after, #progToggle::after, .confirm-btn::after, .checkcircle-btn::after,
.wstat button.st-done::after, .rem-btn.yes::after, .fp-plus::after, .circle-btn::after{
  background:linear-gradient(180deg,
    rgba(255,255,255,0) 0%, rgba(255,255,255,.015) 45%,
    rgba(255,255,255,.07) 72%, rgba(255,255,255,.17) 100%)}
/* Heller Modus: kein weisser Schimmer auf hellem Grund */
html[data-theme="light"] :is(.daycard,.wrow,.lbtn,.ntc-btn,.ringcard,.pline,#settingsBtn,#progToggle,.x-btn,.fp-plus,.confirm-btn,.checkcircle-btn,.xsquare-btn,.wstat button,.rem-btn,.ub-remove,.circle-btn)::after{content:none}
@keyframes flipAway{from{transform:rotateY(0) scale(1); opacity:1}
  to{transform:rotateY(-90deg) scale(0.96); opacity:0.9}}
@keyframes flipIn{from{transform:rotateY(90deg) scale(0.96); opacity:0.9}
  to{transform:rotateY(0) scale(1); opacity:1}}
.dc-head{display:flex; align-items:flex-start; gap:10px}
.dc-day{font-size:26px; font-weight:700; letter-spacing:-0.4px}
.dc-date{color:var(--l2); font-size:14px; font-weight:500; margin-top:2px}
.dc-badge{margin-left:auto; flex:none; background:var(--bg3); border-radius:6px;
  padding:4px 9px; font-size:12px; font-weight:700; color:var(--l2)}
.dc-mid{flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px}
.dc-icobtn{width:47%; aspect-ratio:1/1; border-radius:50%; background:var(--bg3);
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.dc-icobtn:active{transform:scale(1.05)}
.dc-icobtn .ico{width:58%; height:58%}
.dc-name{font-size:37px; font-weight:700; letter-spacing:-0.5px}
.dc-cat{font-size:13.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em}
/* Deko-Aktivitätsringe um den Trainings-Kreis (Füllstand je Trainingsart) */
.dc-ringwrap{position:relative; width:min(78vw, 268px); aspect-ratio:1/1; flex:none;
  display:flex; align-items:center; justify-content:center}
.dc-ringwrap svg{position:absolute; inset:0; width:100%; height:100%}
/* Plus: zweites Training für den Tag */
.plus-btn{width:40px; height:40px; border-radius:50%; background:#000000; flex:none;
  box-shadow:inset 0 0 0 1px var(--bg3); color:#FFFFFF;
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.plus-btn:active{transform:scale(1.06)}
/* Schnell-Umschalter auf der Kachel: Gegenteil-Aktion als Knopf */
.checkcircle-btn{width:48px; height:48px; border-radius:50%; background:var(--green); color:#FFFFFF;
  flex:none; display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.checkcircle-btn:active{transform:scale(0.95)}
.dc-captitle{font-size:11px; font-weight:600; color:var(--l2); letter-spacing:0.04em; text-transform:uppercase}
.dc-status{display:flex; align-items:center; gap:8px; background:var(--bg3);
  border-radius:var(--r-btn); padding:9px 14px; font-size:14px; font-weight:600}
.dc-status .ico{width:18px; height:18px}
.ntc-btn{position:relative; width:48px; height:48px; border-radius:14px; overflow:hidden; padding:0; flex:none; /* Build 8: relative fuer Schimmer-::after; Klasse gilt auch fuer den GOWOD-Knopf */
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.ntc-btn:active{transform:scale(1.05)}
.dc-foot{flex:none; display:flex; align-items:center; gap:10px; margin-top:14px; min-height:48px}
.foot-spacer{flex:1}
.circle-btn{width:46px; height:46px; border-radius:50%; background:var(--l2); color:var(--bg3);
  flex:none; display:flex; align-items:center; justify-content:center; transition:background .2s ease}
.circle-btn:active{background:var(--l1)}
/* Rotes X-Quadrat: einziger Abhak-Knopf rechts unten in der Kachel
   (Erledigt passiert automatisch über autoResolvePast) */
.xsquare-btn{width:48px; height:48px; border-radius:14px; background:var(--red); flex:none;
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.xsquare-btn:active{transform:scale(0.95)}
.xsquare-btn{color:#FFFFFF}
.undo-btn{display:inline-flex; align-items:center; gap:7px; background:var(--bg3);
  border-radius:var(--r-btn); padding:10px 14px; font-size:13px; font-weight:600; color:var(--l1);
  transition:background .2s ease}
.undo-btn:active{background:var(--l3)}
.undo-btn .ico{width:16px; height:16px; background:var(--l2)}

/* ============ Rad-Picker (C3) · Optik wie Stufe-1-Demo, nur grösser ============ */
.wheel-wrap{position:relative; width:min(320px,90%)}
.wheel{position:relative; height:220px; overflow-y:scroll;
  scroll-snap-type:y mandatory; scrollbar-width:none; border-radius:12px;
  -webkit-mask:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent);
  mask:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent)}
.wheel-selbar{position:absolute; left:0; right:0; top:50%; height:44px; transform:translateY(-50%);
  background:rgba(255,255,255,0.08); border-radius:11px; z-index:0; pointer-events:none}
html[data-theme="light"] .wheel-selbar{background:rgba(0,0,0,0.06)}
.wheel::-webkit-scrollbar{display:none}
.wheel.manual{overflow:hidden; scroll-snap-type:none; touch-action:none; cursor:grab}
.wheel .pad{height:88px}
.wheel .wi{position:relative; z-index:1; height:44px; scroll-snap-align:center; display:flex;
  align-items:center; justify-content:center; gap:9px; font-size:19px; font-weight:500;
  color:var(--l2); opacity:.55; transition:color .2s ease, opacity .2s ease}
.wheel .wi.mid{font-size:20px; font-weight:600; opacity:1}
.wheel .wi .ico{width:22px; height:22px; opacity:.45; transition:opacity .2s ease}
.wheel .wi.mid .ico{opacity:1}
.wheel .wi.mid{color:var(--l1)}
.wheel-picked{font-size:13px; font-weight:500; color:var(--l2); text-align:center; min-height:16px}
.wheel-picked b{color:var(--l1); font-weight:700}
.confirm-btn{margin-top:6px; width:48px; height:48px; border-radius:50%; background:var(--blue);
  flex:none; display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.confirm-btn:active{transform:scale(0.95)}
.confirm-btn{color:#FFFFFF}

/* ============ Woche ============ */
#weekList{position:relative; flex:1; min-height:0; display:flex; flex-direction:column; gap:8px; overflow-y:auto;
  padding:6px 6px 4px 0}
.wrow{flex:1; min-height:58px; background:var(--card); border-radius:var(--r-card);
  display:flex; align-items:center; gap:12px; padding:10px 14px; position:relative;
  transition:transform .2s ease, opacity .2s ease, box-shadow .2s ease;
  /* touch-action:none — die Zeile besitzt ihre Geste komplett. Mit pan-y
     übernimmt iOS vertikale Bewegungen als (Gummiband-)Scroll und bricht
     den Drag per pointercancel ab; genau das war das «Hängen» (JB 07-12).
     Muss die Liste je scrollen, übernimmt das der Auto-Scroll am Rand. */
  touch-action:none}
.wrow.today-row{box-shadow:inset 0 0 0 1.5px var(--blue)}
.wrow.dragging{opacity:1; z-index:30; box-shadow:0 10px 26px rgba(0,0,0,.55);
  transition:box-shadow .2s ease; will-change:transform} /* keine Transform-Transition: Karte klebt ruckelfrei am Finger, voll deckend (JB 07-11) */
.wrow.droptarget{box-shadow:inset 0 0 0 3px var(--l1), 0 0 18px rgba(255,255,255,0.30)}
/* Einfüge-Strich: bleibt im DOM und GLEITET per Transform zur jeweiligen
   Lücke (statt hart zu springen); ein-/ausblenden über Opacity (JB 07-12) */
.insert-line{position:absolute; left:8px; right:8px; top:0; height:5px; border-radius:3px;
  background:var(--l1); z-index:25; pointer-events:none; opacity:0;
  box-shadow:0 0 12px rgba(255,255,255,0.5), 0 0 0 1px rgba(0,0,0,0.3);
  transition:transform .18s ease, opacity .15s ease}
.insert-line.show{opacity:1}
.insert-line.jump{transition:opacity .15s ease} /* Position setzen ohne Gleiten */
.wrow.rest{opacity:.55}
.wd{flex:none; width:44px; display:flex; flex-direction:column; align-items:flex-start}
.wd b{font-size:15px; font-weight:700}
.wd span{font-size:11px; color:var(--l2); font-weight:500}
.wrow .ico.tr{width:30px; height:30px}
/* Icon eines festen, noch offenen Tages ist tippbar und öffnet die
   Trainings-Umwahl (Build 10). Knopf minim grösser als das Icon (Tap-
   Ziel), negative Ränder halten das Zeilen-Layout unverändert. */
.wico-btn{flex:none; width:38px; height:38px; margin:-4px; padding:0; border-radius:50%;
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.wico-btn:active{transform:scale(1.08)}
.wico-btn .ico.tr{width:30px; height:30px}
.winfo{flex:1; min-width:0; display:flex; flex-direction:column; gap:1px}
.winfo b{font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.winfo span{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em}
.wstat{flex:none; display:flex; align-items:center; gap:8px}
.wstat button{display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.wstat button:active{transform:scale(0.94)}
.wstat button.st-done{width:34px; height:34px; border-radius:50%; background:var(--green); color:#FFFFFF}
.wstat button.st-skip{width:34px; height:34px; border-radius:11px; background:var(--red)}
.wstat button.st-skip{color:#FFFFFF}
.stackbadge{position:absolute; top:-6px; right:10px; background:var(--bg3); color:var(--l1);
  border:1px solid var(--l3); border-radius:6px; padding:2px 7px; font-size:11px; font-weight:700}
/* Rotes Badge an der Wochen-Zeile: offene Wahltag-Bewertung */
.openbadge{position:absolute; top:-5px; right:-5px; min-width:17px; height:17px; border-radius:9px;
  background:var(--red); color:#FFFFFF; font-size:11px; font-weight:700; display:flex;
  align-items:center; justify-content:center; padding:0 4px; z-index:2}
.openbadge.shift{right:42px}
.rest-label{color:var(--l2); font-size:15px; font-weight:600}
#undoBar{flex:none; display:flex; align-items:center; gap:10px; background:var(--bg2);
  border-radius:var(--r-btn); padding:10px 14px; margin:8px 6px 0 0; font-size:13px; font-weight:600}
#undoBar.hidden{display:none}
#undoBar .msg{color:var(--l2); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
#undoBar button{color:var(--blue); font-size:13px; font-weight:700; flex:none}

/* ============ Fortschritt ============ */
#view-progress .pwrap{flex:1; min-height:0; display:flex; flex-direction:column; gap:10px; overflow-y:auto}
.ringcard{flex:none; background:var(--bg2); border-radius:var(--r-card); padding:14px;
  display:flex; align-items:center; justify-content:center; position:relative}
/* Ring-Ansicht ohne Scrollen (JB 07-11): die Ring-Kachel füllt den Rest
   der Seite und der Ring schrumpft mit, statt die Liste rauszuschieben */
.pwrap:not(.bars-mode) .ringcard{flex:1; min-height:110px}
.pwrap:not(.bars-mode) .ringcard svg{height:100%; width:auto; max-height:240px; aspect-ratio:1/1}
.ringcard svg{display:block}
#progToggle{position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%;
  background:var(--bg3); display:flex; align-items:center; justify-content:center;
  transition:background .2s ease}
#progToggle .ico{width:18px; height:18px; background:var(--l2)}
#progToggle{color:var(--l2)}
/* Balken-Modus: Apple-artiges Säulen-Chart füllt die ganze Kachel
   (feine gepunktete Referenzlinien, Grundlinie, schlanke runde Säulen) */
.pwrap.bars-mode .ringcard{flex:1; min-height:0; align-items:stretch}
.pwrap.bars-mode .plines{display:none}
#progBars{display:flex; flex-direction:column; width:100%; min-height:0}
.abar-chart{position:relative; flex:1; min-height:0; margin:44px 8px 0 4px}
.abar-grid{position:absolute; left:0; right:46px; height:0; border-top:1px dotted var(--l3)}
.abar-glabel{position:absolute; right:-46px; top:-7px; width:42px; font-size:10px; font-weight:600; color:var(--l2)}
.abar-base{position:absolute; left:0; right:46px; bottom:0; height:0; border-top:1.5px solid var(--l3)}
.abar-row{position:absolute; left:0; right:46px; top:0; bottom:0; display:flex;
  justify-content:space-around; align-items:flex-end}
.abar-col{position:relative; width:48px; height:100%}
.abar-bar{position:absolute; left:0; right:0; bottom:0; border-radius:8px 8px 2px 2px;
  transition:height .25s ease}
.abar-pct{position:absolute; left:-12px; right:-12px; text-align:center; font-size:15px;
  font-weight:700; transition:bottom .25s ease}
.abar-foot{flex:none; display:flex; justify-content:space-around; margin:10px 46px 4px 4px}
.abar-fcol{width:72px; display:flex; flex-direction:column; gap:2px; align-items:center; text-align:center}
.pb-cnt{font-size:11px; font-weight:500; color:var(--l2); white-space:nowrap}
.pcol{width:56px; display:flex; flex-direction:column; align-items:center; gap:8px; min-height:0}
.pb-pct{font-size:16px; font-weight:700; letter-spacing:-0.2px}
.pb-track{flex:1; width:100%; min-height:0; border-radius:14px; position:relative; overflow:hidden}
.pb-fill{position:absolute; left:0; right:0; bottom:0; border-radius:14px; transition:height .25s ease}
.pb-cap{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--l2)}
.plines{display:flex; flex-direction:column; gap:10px}
.pline{background:var(--bg2); border-radius:var(--r-card); padding:12px 16px; position:relative} /* Build 9: relative fuer Schimmer */
.pl-top{display:flex; align-items:baseline; gap:8px}
.pl-cat{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em}
.pl-count{margin-left:auto; font-size:13px; color:var(--l2); font-weight:600}
.pl-pct{font-size:22px; font-weight:700; letter-spacing:-0.4px; margin:2px 0 7px}
.pl-bar{display:flex; gap:3px; height:22px} /* Batterie: Reihe stehender Pillen-Segmente */
.pl-seg{flex:1; border-radius:999px; transition:background .25s ease}
.pl-none{color:var(--l2); font-size:13px; font-weight:500; margin-top:4px}

/* ============ Tab-Bar (Liquid-Glass-Pille) ============ */
#tabbar{flex:none; position:fixed; left:0; right:0; z-index:50;
  bottom:19.75px; /* JB-Feintuning 18.07.: erst −5px von unten, dann +1.25px oben und unten wieder dazu (Oberkante 79.25px ueber Rand). Bewusst ohne safe-area-Formel (lieferte auf dem Geraet falsche Werte) */
  width:292px; max-width:calc(100vw - 44px); margin:0 auto; /* Build 7: kompakte Kapsel-Breite wie iOS-26-Referenz (Kurzbefehle), zentriert statt randbuendig */
  display:flex; align-items:stretch; gap:4px;
  height:59.5px; padding:5px;
  border-radius:999px; background:rgba(46,46,50,0.82); /* Build 7: helleres Referenz-Grau statt rgba(20,20,20,.9) */
  -webkit-backdrop-filter:saturate(170%) blur(22px); backdrop-filter:saturate(170%) blur(22px);
  box-shadow:0 10px 28px rgba(0,0,0,0.38); /* alte 0.5px-Rundum-Kante ersetzt durch Schimmer unten (::before) */
  touch-action:pan-y}
/* Build 7 — Schimmer-Kante (Liquid Glass) wie in der iOS-26-Referenz: 1px feine
   Lichtlinie dem Rand entlang, unten am hellsten, seitlich auslaufend, oben keine.
   Gradient als Rahmen; die Maske stanzt die Mitte aus, nur der Rand bleibt. */
#tabbar::before{content:""; position:absolute; inset:0; border-radius:inherit; padding:1px;
  background:linear-gradient(180deg,
    rgba(255,255,255,0) 0%, rgba(255,255,255,.03) 45%,
    rgba(255,255,255,.12) 72%, rgba(255,255,255,.30) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
          mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
          mask-composite:exclude;
  pointer-events:none; z-index:2}
html[data-theme="light"] #tabbar::before{content:none} /* weisser Schimmer auf hellem Glas unsichtbar; Light behaelt seine dunkle Haarlinie */
html[data-theme="light"] #tabbar{background:rgba(255,255,255,0.85);
  box-shadow:0 8px 24px rgba(0,0,0,0.18), inset 0 0 0 0.5px rgba(0,0,0,0.06)}
.tab{position:relative; z-index:1; flex:1 1 0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px; padding:3px 6px;
  border-radius:999px; color:var(--l1); font-size:10px; font-weight:500; letter-spacing:.01em} /* Build 7: Referenz-Typo, inaktiv weiss statt grau */
.tab .ico{width:25px; height:25px; background:var(--l1)}
.tab.act{color:var(--blue)}
.tab.act .ico{background:var(--blue)}
/* Zähler-Badge am Woche-Tab (wie WhatsApp) */
.tab-badge{position:absolute; top:0; left:50%; margin-left:3px; min-width:17px; height:17px;
  border-radius:9px; background:var(--red); color:#FFFFFF; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center; padding:0 4px; z-index:2}
.tab-badge[hidden]{display:none}
.tab-indicator{position:absolute; top:2.5px; bottom:2.5px; left:0; width:0; z-index:0; /* 2.5px Abstand zum Bar-Rand (halbiert), JS expandiert horizontal um denselben Wert */
  border-radius:999px; background:rgba(255,255,255,0.13); pointer-events:none; /* Build 7: Referenz-Ton */
  box-shadow:inset 0 -.5px 0 rgba(255,255,255,.08); /* Build 7: Mini-Lichtkante unten, passend zum Bar-Schimmer */
  transform:translateX(0);
  transition:transform .25s ease, width .25s ease}
html[data-theme="light"] .tab-indicator{background:rgba(0,0,0,0.06); box-shadow:none}
#tabbar.no-anim .tab-indicator{transition:none}
#tabbar.is-dragging .tab-indicator{transition:none}

/* ============ Vollbild-Fenster (Bibliothek) ============ */
#fullpage{position:fixed; inset:0; z-index:70; background:var(--bg);
  display:flex; flex-direction:column;
  transform:translateX(102%); transition:transform .25s ease}
#fullpage.show{transform:translateX(0)}
.fp-head{flex:none; display:flex; align-items:center; gap:12px;
  padding:calc(var(--sat) + 10px) 16px 10px}
.fp-title{font-size:22px; font-weight:700; letter-spacing:-0.3px; flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.fp-body{flex:1; min-height:0; overflow-y:auto; padding:4px 16px calc(var(--sab) + 18px)}
.x-btn{flex:none; width:36px; height:36px; border-radius:50%; background:#000000;
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.x-btn:active{transform:scale(1.05)}
.x-btn{color:#FFFFFF}
html[data-theme="dark"] .x-btn{box-shadow:inset 0 0 0 1px var(--bg3)}
.fp-plus{flex:none; width:36px; height:36px; border-radius:50%; background:var(--blue);
  color:#FFFFFF;
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease}
.fp-plus:active{transform:scale(1.05)}

/* ============ Sheet (Einstellungen) ============ */
#overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:80; opacity:0;
  transition:opacity .25s ease; pointer-events:none}
#overlay.show{opacity:1; pointer-events:auto}
.sheet{position:fixed; left:0; right:0; bottom:0; z-index:90; background:var(--bg2);
  border-radius:var(--r-sheet) var(--r-sheet) 0 0;
  height:calc(100dvh - var(--sat) - 8px); max-height:none;
  display:flex; flex-direction:column;
  transform:translateY(105%); transition:transform .25s ease}
.sheet.show{transform:translateY(0)}
.sh-grab{flex:none; width:38px; height:5px; border-radius:3px; background:var(--l3); margin:8px auto 2px}
.sh-head{flex:none; display:flex; align-items:center; gap:12px; padding:8px 18px 12px}
.sh-title{font-size:20px; font-weight:700; letter-spacing:-0.3px; flex:1; min-width:0}
.sh-body{flex:1; min-height:0; overflow-y:auto; padding:0 18px calc(var(--sab) + 18px)}

/* ============ Listen / Formulare ============ */
.li-row{display:flex; align-items:center; gap:11px; background:var(--bg2);
  border-radius:var(--r-btn); padding:13px 14px; margin-bottom:8px}
.sheet .li-row{background:var(--bg3)}
.li-row.tappable:active{background:var(--bg3)}
.sheet .li-row.tappable:active{background:var(--l3)}
.li-main{flex:1; min-width:0}
.li-main b{display:block; font-size:15px; font-weight:600; line-height:1.3}
.li-main span{font-size:12.5px; color:var(--l2); font-weight:500}
.li-chev{flex:none; width:8px; height:8px; border-right:2px solid var(--l2); border-bottom:2px solid var(--l2);
  transform:rotate(-45deg); transition:transform .2s ease}
.li-chev.open{transform:rotate(45deg)}
.own-badge{flex:none; border:1px solid var(--l3); border-radius:6px; padding:2px 7px;
  font-size:10px; font-weight:700; color:var(--l2); text-transform:uppercase; letter-spacing:0.04em}
.sublist{margin:-2px 0 8px; padding-left:14px; display:none}
.sublist.open{display:block}
.sub-row{display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;
  background:var(--bg2); margin-bottom:6px}
.sub-row:active{background:var(--bg3)}
.sub-row b{font-size:15px; font-weight:700; color:var(--l1); flex:1; min-width:0}
.sub-row .li-chev{transform:rotate(-45deg)}
.detail-name{font-size:28px; font-weight:800; letter-spacing:-0.5px; line-height:1.15;
  color:var(--l1); margin:4px 0 18px}
.d-cap{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
  color:var(--l2); margin:20px 4px 8px}
.d-card{background:var(--bg2); border-radius:var(--r-card); padding:14px 16px}
.d-text{font-size:15px; line-height:1.55; font-weight:400}
.d-tip{display:flex; gap:9px; font-size:14.5px; line-height:1.55; padding:10px 0}
.d-tip + .d-tip{border-top:0.5px solid var(--l3)}
.d-tip:first-child{padding-top:0}
.d-tip:last-child{padding-bottom:0}
.d-tip::before{content:''; flex:none; width:6px; height:6px; border-radius:50%;
  background:var(--blue); margin-top:7px}
.d-src{display:inline-block; font-size:14px; font-weight:600; word-break:break-all}
/* Bibliothek: fette weisse Titel, klar erkennbarer Beginn jedes Trainings/jeder Übung */
.lib-training .li-main b{font-size:17px; font-weight:800; color:var(--l1); letter-spacing:-0.3px}
.lib-training .li-main span{font-size:13px}
.sub-num{flex:none; width:24px; height:24px; border-radius:50%; background:var(--bg3);
  color:var(--l1); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center}
.form-field{margin-bottom:12px}
.form-field label{display:block; font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.04em; color:var(--l2); margin-bottom:5px}
.form-field input,.form-field textarea{width:100%; background:var(--bg2); border:none;
  border-radius:var(--r-btn); color:var(--l1); font-family:var(--font); font-size:15px;
  padding:11px 13px; -webkit-user-select:text; user-select:text}
.sheet .form-field input,.sheet .form-field textarea{background:var(--bg3)}
.form-field textarea{min-height:72px; resize:vertical; line-height:1.45}
.form-field input:focus,.form-field textarea:focus{outline:1.5px solid var(--blue)}
.seg2{display:flex; background:var(--bg2); border-radius:10px; padding:3px; gap:2px; margin-bottom:14px}
.seg2 button{flex:1; padding:9px 4px; border-radius:8px; font-size:13px; font-weight:600; color:var(--l1)}
.seg2 button.act{background:var(--blue); color:#FFFFFF}
.primary-btn{width:100%; background:var(--blue); color:#FFFFFF; border-radius:var(--r-btn);
  padding:14px; font-size:16px; font-weight:700; margin-top:6px}
.primary-btn:active{opacity:.85}
.ghost-btn{width:100%; background:var(--bg2); color:var(--l1); border-radius:var(--r-btn);
  padding:13px; font-size:14px; font-weight:600; margin-top:8px}
.sheet .ghost-btn{background:var(--bg3)}
.uebung-block{border:1px solid var(--l3); border-radius:var(--r-btn); padding:12px; margin-bottom:10px; position:relative}
.ub-remove{position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%;
  background:var(--bg2); display:flex; align-items:center; justify-content:center}
.ub-remove{color:var(--red)}
.form-error{color:var(--red); font-size:13px; font-weight:600; margin:6px 0}

/* Einstellungen */
.set-cap{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em;
  color:var(--l2); margin:18px 0 7px}
.set-group{background:var(--bg3); border-radius:var(--r-card); overflow:hidden; margin-bottom:4px}
.set-row{display:flex; align-items:center; gap:11px; padding:13px 15px; min-height:48px}
.set-row + .set-row{border-top:0.5px solid var(--l3)}
.set-row.tappable:active{background:var(--l3)}
.set-row .lab{flex:1; min-width:0; font-size:15px; font-weight:500}
.set-row .val{display:flex; align-items:center; gap:7px; color:var(--l2); font-size:14px; font-weight:500}
.set-row .val .ico{width:19px; height:19px}
.set-row .li-chev{margin-left:2px}
.set-row.destructive .lab{color:var(--red); font-weight:600}
.switch{position:relative; flex:none; width:50px; height:30px; border-radius:16px; background:var(--bg);
  transition:background .25s ease}
html[data-theme="light"] .switch{background:var(--l3)}
.switch.on{background:var(--green)}
.switch::after{content:''; position:absolute; top:2px; left:2px; width:26px; height:26px;
  border-radius:50%; background:#FFFFFF; transition:transform .25s ease; box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on::after{transform:translateX(20px)}
.warnbox{background:var(--bg3); border:1px solid var(--red); border-radius:var(--r-btn);
  color:var(--red); font-size:13px; font-weight:600; padding:10px 12px; margin:8px 0; line-height:1.4}
.periodrow-wheels{display:flex; gap:12px; margin:10px 0}
.periodrow-wheels .wheel-wrap{flex:1; width:auto}
.periodrow-wheels .wheel{height:176px}
.periodrow-wheels .pad{height:66px}
.pw-cap{text-align:center; font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.04em; color:var(--l2); margin-bottom:5px}

/* ============ Erinnerung: zentrierter Dialog, nicht wegklickbar ============ */
#remWrap, #swapWrap{position:fixed; inset:0; z-index:95; display:none; align-items:center;
  justify-content:center; background:rgba(0,0,0,.6); padding:24px}
#remWrap.show, #swapWrap.show{display:flex}
/* Wahltage- und Umwahl-Dialog im A5-Layout (Design-Katalog 07-19, Build 10):
   Titel, Datums-Caption, grosses Trainings-Icon in der Mitte, Pills,
   Aktionen zentriert darunter. Mehrere offene Tage kommen nacheinander
   dran (Zähler in der Caption), der Erklärsatz ist gestrichen. */
.rembox{background:var(--bg2); border-radius:var(--r-card); width:min(340px, 100%);
  max-height:86dvh; overflow-y:auto; scrollbar-width:none; padding:20px 16px 16px;
  text-align:center; animation:dlgIn .22s ease}
.rembox::-webkit-scrollbar{display:none}
@keyframes dlgIn{from{transform:scale(1.05); opacity:0}to{transform:scale(1); opacity:1}}
.rembox h3{font-size:18px; font-weight:700}
.rem-cap{font-size:11px; font-weight:600; color:var(--l2); letter-spacing:0.04em;
  text-transform:uppercase; margin-top:4px}
.rem-big{width:74px; height:74px; border-radius:50%; background:var(--bg3);
  display:flex; align-items:center; justify-content:center; margin:16px auto 0}
.rem-big .ico{width:40px; height:40px}
.rem-big.empty{background:none; box-shadow:inset 0 0 0 2px var(--l3)}
.rem-big.empty::before{content:'?'; font-size:26px; font-weight:700; color:var(--l3)}
.rem-acts{display:flex; justify-content:center; align-items:center; gap:16px; margin-top:16px}
.rem-btn{width:44px; height:44px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; transition:background .2s ease, color .2s ease, transform .2s ease}
.rem-btn:active{transform:scale(0.95)}
.rem-btn.no{background:#000000; box-shadow:inset 0 0 0 1px var(--bg3); color:#FFFFFF}
/* Haken im Dialog nach Katalog A5 (Referenz-Look 07-19): erst grauer Kreis
   mit dunklem Haken (Training fehlt noch), nach der Wahl hellblau mit
   dunkelblauem Haken. Feste Werte, weil die ok-Tokens im aktuellen
   Strang nicht mehr existieren. */
.rem-btn.yes{width:42px; height:42px; background:#454548; color:#141416}
.rem-btn.yes.on{background:#6EB5F7; color:#0F345F}
html[data-theme="light"] .rem-btn.yes{background:#D4D4D9; color:#3A3A3D}
html[data-theme="light"] .rem-btn.yes.on{background:#6EB5F7; color:#0F345F}
.rem-pills{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:14px}
.rem-pill{display:inline-flex; align-items:center; gap:6px; background:var(--bg2); border:1px solid var(--l3);
  border-radius:16px; padding:6px 11px; font-size:12.5px; font-weight:600; color:var(--l1)}
.rem-pill .ico{width:15px; height:15px}
.rem-pill.act{border-color:var(--blue); color:var(--blue)}
.rem-pill.act .ico{background:var(--blue)}

/* Bestätigungs-Dialog im nativen iOS-Alert-Stil (Design-Katalog B3/C4,
   Build 10): Blur-Box, Hairline-Trenner, Text-Knöpfe ohne Füllung.
   iOS-Konvention: bei destruktiven Dialogen ist «Abbrechen» halbfett und
   die rote Aktion normal, sonst ist die blaue Aktion fett. Die Status-
   Dialoge kommen ohne Erklärsatz; wo eine msg übergeben wird (Löschen,
   Zurücksetzen), erscheint sie als Untertitel. */
#alertWrap{position:fixed; inset:0; z-index:100; display:none; align-items:center;
  justify-content:center; background:rgba(0,0,0,.55); padding:32px}
#alertWrap.show{display:flex}
.alert{background:rgba(42,42,44,0.93); -webkit-backdrop-filter:blur(20px) saturate(160%);
  backdrop-filter:blur(20px) saturate(160%); border-radius:14px; width:min(270px,100%);
  text-align:center; overflow:hidden; animation:dlgIn .2s ease}
.alert .ahead{padding:19px 16px}
.alert h3{font-size:17px; font-weight:600}
.alert p{font-size:13px; color:var(--l2); line-height:1.4; margin-top:4px}
.alert .arow{display:flex; box-shadow:0 -0.5px 0 rgba(255,255,255,0.22)}
.alert .arow button{flex:1; padding:12px 8px; font-size:17px; border-radius:0}
.alert .arow button + button{box-shadow:-0.5px 0 0 rgba(255,255,255,0.22)}
.a-cancel{color:var(--blue); font-weight:400}
.alert.destr .a-cancel{font-weight:600}
.a-ok{color:var(--blue); font-weight:700}
.a-ok.destructive{color:var(--red); font-weight:400}
html[data-theme="light"] .alert{background:rgba(248,248,248,0.93)}
html[data-theme="light"] .alert .arow{box-shadow:0 -0.5px 0 rgba(0,0,0,0.24)}
html[data-theme="light"] .alert .arow button + button{box-shadow:-0.5px 0 0 rgba(0,0,0,0.24)}

@media(min-width:700px){
  #topbar,.view,.fp-head,.fp-body{padding-left:calc(50vw - 334px); padding-right:calc(50vw - 334px)}
  #tabbar{max-width:668px; margin-left:auto; margin-right:auto}
}
</style>
</head>

<body>

<header id="topbar">
  <a class="lbtn" data-logo="health" href="shortcuts://run-shortcut?name=Health" aria-label="Apple Health öffnen"></a>
  <a class="lbtn" data-logo="fitness" href="shortcuts://run-shortcut?name=Fitness" aria-label="Apple Fitness öffnen"></a>
  <a class="lbtn" data-logo="gowod" href="shortcuts://run-shortcut?name=GOWOD" aria-label="GOWOD öffnen"></a>
  <a class="lbtn" data-logo="bevel" href="shortcuts://run-shortcut?name=Bevel" aria-label="Bevel öffnen"></a>
  <button id="settingsBtn" aria-label="Einstellungen"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="22" height="22" fill="currentColor"><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(0 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(45 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(90 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(135 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(180 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(225 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(270 50 50)"/><rect x="41.0" y="11.5" width="18" height="14.5" rx="6.5" transform="rotate(315 50 50)"/><path fill-rule="evenodd" d="M19,50 a31,31 0 1 0 62,0 a31,31 0 1 0 -62,0 Z M37.5,50 a12.5,12.5 0 1 0 25.0,0 a12.5,12.5 0 1 0 -25.0,0 Z"/></svg></button>
</header>

<main id="main">

  <section id="view-today" class="view active">
    <div id="stage"></div>
  </section>

  <section id="view-week" class="view">
    <div class="vtitle">Woche</div>
    <div class="vsub" id="weekRange"></div>

      <span class="msg" id="undoMsg"></span>

    <div class="vtitle">Fortschritt</div>

    <div class="pwrap">
      <div class="ringcard"><svg id="ringSvg" width="240" height="240" viewBox="0 0 240 240"></svg><div class="pbars" id="progBars" style="display:none"></div><button id="progToggle" aria-label="Ansicht wechseln"></button></div>
      <div class="plines" id="progLines"></div>
    </div>
  </section>

</main>

<nav id="tabbar">
  <div class="tab-indicator" aria-hidden="true"></div>
  <button class="tab act" data-tab="today"><span class="ico" data-ico="rectangle.fill.on.rectangle.angled.fill"></span>Heute</button>
  <button class="tab" data-tab="week"><span class="ico" data-ico="calendar"></span>Woche<span class="tab-badge" hidden></span></button>
  <button class="tab" data-tab="progress"><span class="ico" data-ico="chart.bar.fill"></span>Fortschritt</button>
</nav>

<div id="fullpage"></div>
<div id="overlay"></div>
<div id="sheet" class="sheet" role="dialog"></div>
<div id="remWrap" role="dialog" aria-modal="true" aria-label="Offene Wahltage"></div>
<div id="swapWrap" role="dialog" aria-modal="true" aria-label="Training ändern"></div>
<div id="alertWrap"></div>

/* Handy-Vorschau: ?frame=1 simuliert die iPhone-Schutzbereiche (Statusleiste, Home-Balken) */

/* ---------- Icon-Helfer ---------- */
function ico(name, cls){
  const s = document.createElement('span');
  s.className = 'ico' + (cls ? ' ' + cls : '');
  s.style.setProperty('--src', 'url(' + ICONS[name] + ')');
  return s;
}
/* Selbst gezeichnete Strich-Symbole (dick, runde Kappen) — bewusst ohne
   Set-Icons, damit Haken/X/Pfeil keinen eingebauten Kreisrand mitbringen.
   Farbe über 'currentColor' → der Button steuert sie per CSS color. */
function svgStroke(kind, size, strokeW){
  const P = {
    check: '<path d="M5 12.6 L10 17.6 L19 6.8"/>',
    x:     '<path d="M6.5 6.5 L17.5 17.5 M17.5 6.5 L6.5 17.5"/>',
    back:  '<path d="M8.6 4.6 L4.6 8.6 L8.6 12.6 M4.6 8.6 H14.4 A4.8 4.8 0 0 1 14.4 18.2 H9"/>',
    plus:  '<path d="M12 5.2 V18.8 M5.2 12 H18.8"/>',
    rings: '<g transform="rotate(-90 12 12)"><circle cx="12" cy="12" r="9.4" stroke-dasharray="49 10"/><circle cx="12" cy="12" r="5.6" stroke-dasharray="23.2 12"/><circle cx="12" cy="12" r="1.9" stroke-dasharray="3.35 8.6"/></g>'
  };
  return '<svg viewBox="0 0 24 24" width="' + size + '" height="' + size +
    '" fill="none" stroke="currentColor" stroke-width="' + (strokeW || 3.4) +
    '" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + P[kind] + '</svg>';
}
document.querySelectorAll('[data-ico]').forEach(el => {
  el.style.setProperty('--src', 'url(' + ICONS[el.dataset.ico] + ')');
});
document.querySelectorAll('[data-logo]').forEach(el => {
  const src = LOGOS[el.dataset.logo];
  el.innerHTML = src ? '<img class="applogo" src="' + src + '" alt="">' : '';
});

/* ---------- Trainings & Kategorien (Spec 3) ---------- */
const TR = {
  run:      { name:'Joggen',     cat:'cardio', icon:'figure.run',                             ntc:false },
  cycle:    { name:'Indoorbike', cat:'cardio', icon:'figure.indoor.cycle',                    ntc:false },
  strength: { name:'Kraft',      cat:'kraft',  icon:'figure.strengthtraining.traditional',    ntc:true  },
  hiit:     { name:'HIIT',       cat:'kraft',  icon:'figure.highintensity.intervaltraining',  ntc:true  },
  pilates:  { name:'Pilates',    cat:'kraft',  icon:'figure.highintensity.intervaltraining',  ntc:true  },
  yoga:     { name:'Yoga',       cat:'flex',   icon:'figure.flexibility',                     ntc:true  }
};
const CATS = {
  cardio: { label:'Cardio',        color:'var(--green)',  icoCls:'ic-green'  },
  kraft:  { label:'Kraft',         color:'var(--orange)', icoCls:'ic-orange' },
  flex:   { label:'Beweglichkeit', color:'var(--blue)',   icoCls:'ic-blue'   }
};
const CHOICE = {
  tue:  ['strength','pilates','hiit','cycle','yoga'],
  wknd: ['run','cycle','pilates']
};
const DEFAULT_PLAN = {
  kraft: {
    periods: [ {from:12,to:2}, {from:6,to:8} ],
    days: ['hiit','choice:tue','yoga','strength','yoga','choice:wknd','choice:wknd']
  },
  cardio: {
    periods: [ {from:3,to:5}, {from:9,to:11} ],
    days: ['run','choice:tue','yoga','run','yoga','strength','strength']
  }
};
const DAY_NAMES  = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const DAY_SHORT  = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

/* ---------- Speicher (Spec 13) ---------- */
const K = {
  plan:  'sportapp_v1_plan',
  week:  'sportapp_v1_week',
  prefs: 'sportapp_v1_prefs',
  lib:   'sportapp_v1_lib_custom'
};
function loadJSON(key, fallback){
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
/* Nur echte Web-Links sind anklickbar — schützt vor javascript:-URLs in
   selbst erfassten Quell-Links (Sicherheits-Review JB 07-12) */
function safeHref(url){
  try {
    const u = new URL(String(url), location.href);
    if (u.protocol === 'http:' || u.protocol === 'https:') return u.href;
  } catch(e){}
  return null;
}

/* ---------- Datum ---------- */
function today(){ return new Date(); }
function mondayOf(d){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const wd = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - wd);
  return x;
}
function weekKeyOf(d){
  const x = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (x.getUTCDay() + 6) % 7;
  x.setUTCDate(x.getUTCDate() - dayNum + 3);
  const firstThu = new Date(Date.UTC(x.getUTCFullYear(), 0, 4));
  const ftDay = (firstThu.getUTCDay() + 6) % 7;
  firstThu.setUTCDate(firstThu.getUTCDate() - ftDay + 3);
  const wk = 1 + Math.round((x - firstThu) / 604800000);
  return x.getUTCFullYear() + '-W' + String(wk).padStart(2,'0');
}
function dateOfDay(idx){
  const m = mondayOf(today());
  const d = new Date(m); d.setDate(m.getDate() + idx);
  return d;
}
function fmtDate(d){ return d.getDate() + '. ' + MONTH_NAMES[d.getMonth()]; }
function todayIdx(){ return (today().getDay() + 6) % 7; }

/* ---------- Plan ---------- */
/* Gespeicherte Daten nie blind übernehmen: kaputte/fremde localStorage-
   Inhalte dürfen die App nicht beim Start crashen (Review JB 07-12) */
function validPlanShape(p){
  return !!p && typeof p === 'object' && ['kraft','cardio'].every(ph =>
    p[ph] && Array.isArray(p[ph].periods)
    && p[ph].periods.every(x => x && typeof x.from === 'number' && typeof x.to === 'number')
    && Array.isArray(p[ph].days) && p[ph].days.length === 7);
}
let plan = loadJSON(K.plan, null);
if (!validPlanShape(plan)) plan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
function savePlan(){ saveJSON(K.plan, plan); }

function monthInPeriod(m, p){
  return p.from <= p.to ? (m >= p.from && m <= p.to) : (m >= p.from || m <= p.to);
}
function phaseForMonth(m){
  for (const ph of ['kraft','cardio']){
    for (const p of plan[ph].periods){ if (monthInPeriod(m, p)) return ph; }
  }
  for (const ph of ['kraft','cardio']){
    for (const p of DEFAULT_PLAN[ph].periods){ if (monthInPeriod(m, p)) return ph; }
  }
  return 'kraft';
}
function validatePeriods(pl){
  const cover = {};
  for (const ph of ['kraft','cardio']){
    for (const p of pl[ph].periods){
      for (let m = 1; m <= 12; m++){
        if (monthInPeriod(m, p)){ cover[m] = (cover[m] || 0) + 1; }
      }
    }
  }
  const missing = [], overlap = [];
  for (let m = 1; m <= 12; m++){
    if (!cover[m]) missing.push(MONTH_NAMES[m-1]);
    else if (cover[m] > 1) overlap.push(MONTH_NAMES[m-1]);
  }
  return { ok: !missing.length && !overlap.length, missing, overlap };
}
function currentPhase(){ return phaseForMonth(today().getMonth() + 1); }

/* ---------- Wochen-Zustand ---------- */
function validWeekShape(w){
  return !!w && typeof w === 'object' && typeof w.key === 'string'
    && Array.isArray(w.days) && w.days.length === 7
    && w.days.every(d => d && Array.isArray(d.units));
}
let week = loadJSON(K.week, null);
if (!validWeekShape(week)) week = null; /* ensureWeek() legt dann neu an */
let unitSeq = 1;

function newWeek(){
  const ph = currentPhase();
  const days = [];
  for (let i = 0; i < 7; i++){
    const def = plan[ph].days[i];
    const u = { id: 'u' + (unitSeq++), origDay: i };
    if (typeof def === 'string' && def.indexOf('choice') === 0){
      u.kind = 'choice';
      u.opts = def === 'choice:wknd' ? 'wknd' : 'tue';
      u.chosen = null;
    } else {
      u.kind = 'fixed';
      u.training = def;
    }
    u.status = null;
    days.push({ units: def ? [u] : [], cycle: 0 });
  }
  return { key: weekKeyOf(today()), phase: ph, days, moves: [] };
}
function ensureWeek(){
  if (!week || week.key !== weekKeyOf(today())){
    week = newWeek();
    saveWeek();
  }
  /* Migration: alte Undo-Einträge ohne Schnappschuss verwerfen (Format 07-06) */
  week.moves = (week.moves || []).filter(m => m && m.before);
  week.days.forEach(d => { if (typeof d.cycle !== 'number' || !(d.cycle >= 0)) d.cycle = 0; });
  let maxId = 0;
  week.days.forEach(d => d.units.forEach(u => {
    const n = parseInt(String(u.id).slice(1), 10); if (n > maxId) maxId = n;
  }));
  unitSeq = maxId + 1;
}
function saveWeek(){ saveJSON(K.week, week); }

function unitTraining(u){ return u.kind === 'fixed' ? u.training : u.chosen; }
function unitById(id){
  for (let i = 0; i < 7; i++){
    const u = week.days[i].units.find(x => x.id === id);
    if (u) return { unit: u, day: i };
  }
  return null;
}
function frontUnit(dayIdx){
  const d = week.days[dayIdx];
  const us = d.units;
  if (!us.length) return null;
  const off = d.cycle % us.length;
  const rot = us.slice(off).concat(us.slice(0, off));
  /* Ohne Zaehler-Tipp steht die erste offene Einheit vorne; nach einem
     Tipp auf «x2» rotiert es strikt durch ALLE Einheiten, auch bewertete,
     damit jede einzeln umgestellt werden kann (JB 07-06). */
  if (d.cycle === 0) return rot.find(u => !u.status) || rot[rot.length - 1];
  return rot[0];
}

/* Vergangene Tage gelten automatisch als gemacht: Jede Einheit ohne Status,
   deren Training feststeht (fixed oder gewählter Wahltag), wird 'done'.
   Offen bleiben nur vergangene Wahltage ohne Wahl (JB 07-05). */
function autoResolvePast(){
  let changed = false;
  for (let i = 0; i < todayIdx(); i++){
    week.days[i].units.forEach(u => {
      if (!u.status && unitTraining(u)){ u.status = 'done'; changed = true; }
    });
  }
  if (changed) saveWeek();
}

/* ---------- Fortschritt (Spec 6) ---------- */
function calcProgress(){
  const res = { cardio:{done:0,total:0}, kraft:{done:0,total:0}, flex:{done:0,total:0} };
  week.days.forEach(d => d.units.forEach(u => {
    if (u.kind === 'fixed'){
      const c = TR[u.training].cat;
      res[c].total++;
      if (u.status === 'done') res[c].done++;
    } else if (u.status && u.chosen){
      const c = TR[u.chosen].cat;
      res[c].total++;
      if (u.status === 'done') res[c].done++;
    }
  }));
  return res;
}

/* ---------- Prefs / Theme ---------- */
let prefs = loadJSON(K.prefs, null);
if (!prefs || typeof prefs !== 'object') prefs = { theme:'dark' };
if (prefs.theme !== 'light') prefs.theme = 'dark';
function applyTheme(){
  document.documentElement.dataset.theme = prefs.theme;
  saveJSON(K.prefs, prefs);
}
applyTheme();

/* =====================================================================
   HEUTE-VIEW · Kachel zeigt immer den heutigen Tag.
   Tageswechsel macht die App selbst: Beim Öffnen an einem neuen Tag
   dreht die zuletzt gezeigte Karte weg und die heutige herein (JB 07-04).
   ===================================================================== */
const stage = document.getElementById('stage');
let flipping = false;

let addingExtraDay = null;

/* Deko-Aktivitätsringe um den Trainings-Kreis: Füllstand je Trainingsart
   (aussen, mitte, innen) — der innerste führt immer, Werte bewusst
   unregelmässig gestuft (JB 07-06). */
const RINGS_BY_TRAINING = {
  run:      [100, 100, 100],
  cycle:    [84, 90, 95],
  strength: [58, 66, 74],
  hiit:     [62, 71, 79],
  pilates:  [55, 65, 72],
  yoga:     [38, 46, 54]
};
function cssColVar(v){
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim() || v;
}
function decoRings(trainingKey){
  /* Deko-Ringe in den Original-Farben der Apple-Fitness-Ringe (JB 07-06),
     lückenlos: die drei Ringe berühren sich und der innerste liegt am
     Trainings-Kreis an. Nicht gefüllter Teil = abgedunkelter Track. */
  const wrap = document.createElement('div'); wrap.className = 'dc-ringwrap';
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', '0 0 240 240');
  const W = 19; /* Ringdicke; Radien so, dass sich die Strokes berühren */
  /* Apple-Fitness-Farbcharakter, aber leicht gedeckt statt grell (JB 07-06) */
  const spec = [
    { r: 104, col: '#E11250' },  /* aussen: Bewegen-Rot */
    { r: 85,  col: '#8FD60D' },  /* mitte: Trainieren-Grün */
    { r: 66,  col: '#00C9C2' }   /* innen: Stehen-Cyan */
  ];
  const pcts = RINGS_BY_TRAINING[trainingKey] || [50, 60, 70];
  spec.forEach((s, i) => {
    const circ = 2 * Math.PI * s.r;
    const track = document.createElementNS(NS, 'circle');
    track.setAttribute('cx','120'); track.setAttribute('cy','120'); track.setAttribute('r', s.r);
    track.setAttribute('fill','none'); track.setAttribute('stroke', s.col);
    track.setAttribute('stroke-width', W); track.setAttribute('opacity','0.22');
    svg.appendChild(track);
    const pct = Math.min(pcts[i], 100);
    if (pct > 0){
      const arc = document.createElementNS(NS, 'circle');
      arc.setAttribute('cx','120'); arc.setAttribute('cy','120'); arc.setAttribute('r', s.r);
      arc.setAttribute('fill','none'); arc.setAttribute('stroke', s.col);
      arc.setAttribute('stroke-width', W);
      if (pct < 100) arc.setAttribute('stroke-linecap','round');
      arc.setAttribute('stroke-dasharray', (circ * pct / 100) + ' ' + circ);
      arc.setAttribute('transform','rotate(-90 120 120)');
      svg.appendChild(arc);
    }
  });
  wrap.appendChild(svg);
  return wrap;
}

function buildDayCard(dayIdx){
  const card = document.createElement('div');

  const headR = document.createElement('div');

  const mid = document.createElement('div'); mid.className = 'dc-mid';

  /* Zusatz-Training wählen (Plus-Fluss) */
  if (addingExtraDay === dayIdx){

  if (!unit){

    conf.setAttribute('aria-label','Bestätigen');

    conf.onclick = () => {
      unit.chosen = wheel.selected();
      saveWeek(); showToday(); renderWeekView(); renderProgress();
    };
    mid.appendChild(conf);
    return card;
  }

  const t = unitTraining(unit);
  const tr = TR[t], cat = CATS[tr.cat];

  /* Trainings-Kreis mit Deko-Ringen drumherum */
  const rw = decoRings(t);
  const icoBtn = document.createElement('button'); icoBtn.className = 'dc-icobtn';
  icoBtn.setAttribute('aria-label','Übungen ' + cat.label + ' öffnen');
  icoBtn.appendChild(ico(tr.icon, cat.icoCls));
  icoBtn.onclick = () => openLibrary(tr.cat);
  rw.appendChild(icoBtn);
  mid.appendChild(rw);

  const nm = document.createElement('div'); nm.className = 'dc-name'; nm.textContent = tr.name;
  mid.appendChild(nm);
  const ct = document.createElement('div'); ct.className = 'dc-cat'; ct.style.color = cat.color; ct.textContent = cat.label;
  mid.appendChild(ct);

  /* Fusszeile: ganz links in der Ecke der NTC-Knopf (JB 07-09), daneben
     Rad-Zurück (offener Wahltag) bzw. Rückgängig (bewertet),
     rechts der Schnell-Umschalter: X = nicht gemacht, grüner Haken = gemacht.
     So lässt sich der Status direkt auf der Kachel hin- und herschalten. */
  const foot = document.createElement('div'); foot.className = 'dc-foot';
  /* Build 8: GOWOD-Knopf vor NTC, sobald ein Beweglichkeits-Training (Kategorie
     flex) auf der Kachel liegt — gleiche Optik/Groesse wie der NTC-Knopf. */
  if (tr.cat === 'flex' && !unit.status){
    const g = document.createElement('a'); g.className = 'ntc-btn';
    g.href = 'shortcuts://run-shortcut?name=GOWOD';

    foot.appendChild(g);

  if (tr.ntc && !unit.status){
    const a = document.createElement('a'); a.className = 'ntc-btn';
    a.href = 'shortcuts://run-shortcut?name=NTC';
    a.setAttribute('aria-label','Nike Training Club öffnen');
    a.innerHTML = LOGOS.ntc ? '<img class="applogo" src="' + LOGOS.ntc + '" alt="">' : '';

     neu waehlen), normale feste Trainings haben weiterhin keinen Zurueck-Knopf. */
  if (unit.added && unit.kind !== 'choice' && !unit.status){

    back.setAttribute('aria-label','Hinzugefügtes Training entfernen');

      saveWeek(); showToday(); renderWeekView(); renderProgress(); updateBadges();
    };
    foot.appendChild(back);
  }
  const spacer = document.createElement('div'); spacer.className = 'foot-spacer';

  if (unit.status === 'skip'){

    yes.setAttribute('aria-label','Als erledigt markieren');
    yes.innerHTML = svgStroke('check', 26, 4.2);
    yes.onclick = () => { unit.status = 'done'; saveWeek(); showToday(); renderWeekView(); renderProgress(); updateBadges(); };
    foot.appendChild(yes);
  } else {
    const no = document.createElement('button'); no.className = 'xsquare-btn';

    no.innerHTML = svgStroke('x', 24, 4.2);

    foot.appendChild(no);
  }
  if (unit.status){
    /* Zurück springt in die rechte Ecke (dorthin, wo X/Haken standen),
       das Wechsel-Symbol steht daneben (JB 07-06) */
    const un = document.createElement('button'); un.className = 'circle-btn';
    un.setAttribute('aria-label','Rückgängig');
    un.innerHTML = svgStroke('back', 22, 2.6);
    un.onclick = () => { unit.status = null; saveWeek(); showToday(); renderWeekView(); renderProgress(); updateBadges(); };
    foot.appendChild(un);
  }
  card.appendChild(foot);
  return card;
}

/* Abschieds-Karte: Schnappschuss der zuletzt gezeigten Karte */

let currentCard = null;
function saveSnapshot(){
  const idx = todayIdx();
  const unit = frontUnit(idx);
  prefs.lastCard = {
    wk: week.key, day: idx,
    dayName: DAY_NAMES[idx], dateStr: fmtDate(dateOfDay(idx)),
    t: unit ? unitTraining(unit) : null,
    rest: !unit
  };
