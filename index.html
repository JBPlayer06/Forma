}
function showToday(){
  stage.innerHTML = '';
  currentCard = buildDayCard(todayIdx());
  stage.appendChild(currentCard);
  saveSnapshot();
}
/* Zweiphasiger 3D-Flip: alte Karte dreht weg (ease-in), dann die heutige
   herein (ease-out). Läuft nur automatisch beim Öffnen an einem neuen Tag. */
function flipToToday(){
  if (flipping) return;
  flipping = true;
  const incoming = buildDayCard(todayIdx());
  const old = currentCard;
  old.style.animation = 'flipAway 0.3s ease-in forwards';
  let phase2 = false;
  const startIn = () => {
    if (phase2) return; phase2 = true;
    try { old.remove(); } catch(e){}
    incoming.style.animation = 'flipIn 0.3s ease-out forwards';
    stage.appendChild(incoming);
    let done = false;
    const finish = () => {
      if (done) return; done = true;
      incoming.style.animation = '';
      currentCard = incoming;
      flipping = false;
      saveSnapshot();
    };
    incoming.addEventListener('animationend', finish, { once:true });
    setTimeout(finish, 500);
  };
  old.addEventListener('animationend', startIn, { once:true });
  setTimeout(startIn, 480);
}

/* ---------- Rad-Picker (C3, Spec 8 + JB 07-04) ----------
   Optik und Scroll-Verhalten wie die Stufe-1-Demo (Snap + Fade), nur
   grösser. Festgelegt wird die Wahl erst über den Bestätigen-Knopf. */
function buildWheel(entries, onChange, initialKey){
  /* Endlos-Rad im Stil des Apple-Weckers (JB 07-06): transparenter Grund,
     heller Auswahlbalken in der Mitte, alles zentriert. Die Einträge
     wiederholen sich (REPS), man kann rundum drehen. Bedient wird es zäh
     und abgestuft: Fingerweg /2.6, kein Momentum, Einrasten beim Loslassen.
     entries: [{k, label, icon?, cls?}] */
  const wrap = document.createElement('div'); wrap.className = 'wheel-wrap';
  const selbar = document.createElement('div'); selbar.className = 'wheel-selbar';
  const wh = document.createElement('div'); wh.className = 'wheel manual';
  wrap.appendChild(selbar); wrap.appendChild(wh);
  const REPS = 9, ITEM = 44;
  const base = entries.length * ITEM;
  const items = [];
  let moved = false;
  for (let r = 0; r < REPS; r++){
    entries.forEach(en => {
      const it = document.createElement('div'); it.className = 'wi'; it.dataset.k = en.k;
      if (en.icon) it.appendChild(ico(en.icon, en.cls));
      const sp = document.createElement('span'); sp.textContent = en.label; it.appendChild(sp);
      it.addEventListener('click', () => {
        if (moved) return;
        setTop(it.offsetTop + ITEM / 2 - wh.clientHeight / 2, true);
      });
      wh.appendChild(it); items.push(it);
    });
  }
  function midItem(){
    const c0 = wh.scrollTop + wh.clientHeight / 2;
    let best = items[0], bd = 1e9;
    items.forEach(it => {
      const d = Math.abs(it.offsetTop + ITEM / 2 - c0);
      if (d < bd){ bd = d; best = it; }
    });
    return best;
  }
  let lastKey = null;
  function highlight(){
    const m = midItem();
    items.forEach(it => it.classList.toggle('mid', it === m));
    if (m.dataset.k !== lastKey){ lastKey = m.dataset.k; if (onChange) onChange(lastKey); }
  }
  function normalize(){
    if (!base) return;
    while (wh.scrollTop < base * 2) wh.scrollTop += base;
    while (wh.scrollTop > base * (REPS - 3)) wh.scrollTop -= base;
  }
  function setTop(v, smooth){
    if (smooth){
      try { wh.scrollTo({ top: v, behavior: 'smooth' }); return; } catch(e){}
    }
    wh.scrollTop = v;
  }
  function snap(){
    normalize();
    const off = wh.scrollTop % ITEM;
    const target = wh.scrollTop - off + (off > ITEM / 2 ? ITEM : 0);
    setTop(target, true);
    setTimeout(highlight, 80);
  }
  /* Nur ein Finger steuert das Rad: Zweitfinger würden sonst startY/startTop
     überschreiben und das Rad springen lassen (JB 07-12) */
  let dragging = false, wpid = null, startY = 0, startTop = 0, wheelTimer = null;
  wh.addEventListener('pointerdown', e => {
    if (dragging) return;
    dragging = true; wpid = e.pointerId; moved = false; startY = e.clientY; startTop = wh.scrollTop;
    try { wh.setPointerCapture(e.pointerId); } catch(err){}
  });
  wh.addEventListener('pointermove', e => {
    if (!dragging || e.pointerId !== wpid) return;
    const dy = e.clientY - startY;
    if (Math.abs(dy) > 4) moved = true;
    wh.scrollTop = startTop - dy / 2.47; /* 5 % leichter (JB 07-11) */
  });
  const endDrag = (e) => {
    if (!dragging || e.pointerId !== wpid) return;
    dragging = false; wpid = null; snap();
    setTimeout(() => { moved = false; }, 60);
  };
  wh.addEventListener('pointerup', endDrag);
  wh.addEventListener('pointercancel', endDrag);
  wh.addEventListener('wheel', e => {
    e.preventDefault();
    wh.scrollTop += e.deltaY / 2.47; /* 5 % leichter (JB 07-11) */
    clearTimeout(wheelTimer); wheelTimer = setTimeout(snap, 160);
  }, { passive: false });
  wh.addEventListener('scroll', highlight, { passive: true });
  requestAnimationFrame(() => {
    let idx = 0;
    if (initialKey != null){
      const f = entries.findIndex(en => String(en.k) === String(initialKey));
      if (f >= 0) idx = f;
    }
    wh.scrollTop = base * 4 + idx * ITEM + ITEM / 2 - wh.clientHeight / 2;
    highlight();
  });
  return { el: wrap, selected: () => midItem().dataset.k };
}
function trainingWheelEntries(keys){
  return keys.map(k => ({ k, label: TR[k].name, icon: TR[k].icon, cls: CATS[TR[k].cat].icoCls }));
}
</script>

<script>
'use strict';
/* =====================================================================
   WOCHE-VIEW · Übersicht, Umplanen per Drag (verschieben), Undo
   ===================================================================== */
const weekList = document.getElementById('weekList');
const undoBar  = document.getElementById('undoBar');
const undoMsg  = document.getElementById('undoMsg');

function renderWeekView(){
  /* Läuft gerade ein Drag (z. B. weil der Minuten-Check mitten in der
     Geste neu zeichnet), zuerst sauber abbrechen — sonst bleibt eine
     verwaiste, verschobene Kachel zurück */
  if (weekDrag.cancel) weekDrag.cancel();
  const mon = mondayOf(today()), sun = dateOfDay(6);
  document.getElementById('weekRange').textContent =
    fmtDate(mon) + ' – ' + fmtDate(sun) + ' · ' + (week.phase === 'kraft' ? 'Kraft-Phase' : 'Cardio-Phase');
  weekList.innerHTML = '';
  for (let i = 0; i < 7; i++){
    weekList.appendChild(buildWeekRow(i));
  }
  updateUndoBar();
}
function buildWeekRow(i){
  const d = week.days[i];
  const row = document.createElement('div'); row.className = 'wrow';
  row.dataset.day = i;
  if (i === todayIdx()) row.classList.add('today-row');

  const wd = document.createElement('div'); wd.className = 'wd';
  const b = document.createElement('b'); b.textContent = DAY_SHORT[i];
  const s = document.createElement('span'); s.textContent = String(dateOfDay(i).getDate());
  wd.appendChild(b); wd.appendChild(s);
  row.appendChild(wd);

  const unit = frontUnit(i);
  if (!unit){
    row.classList.add('rest');
    const r = document.createElement('div'); r.className = 'rest-label'; r.textContent = 'Ruhetag';
    row.appendChild(r);
    return row;
  }

  const t = unitTraining(unit);
  if (t){
    const tr = TR[t], cat = CATS[tr.cat];
    const icoEl = ico(tr.icon, cat.icoCls + ' tr');
    /* Icon eines festen, noch unbewerteten Tages (heute oder später) ist
       tippbar und öffnet die Trainings-Umwahl — X/Haken und Wahltage
       bleiben unberührt (Build 10) */
    if (unit.kind === 'fixed' && !unit.status && i >= todayIdx()){
      const ib = document.createElement('button');
      ib.className = 'wico-btn';
      ib.setAttribute('aria-label', 'Training ändern');
      ib.appendChild(icoEl);
      ib.onclick = (e) => {
        e.stopPropagation();
        if (dragMoved) return;
        openSwapDialog(unit, i);
      };
      row.appendChild(ib);
    } else {
      row.appendChild(icoEl);
    }
    const info = document.createElement('div'); info.className = 'winfo';
    const nb = document.createElement('b'); nb.textContent = tr.name;
    const ns = document.createElement('span'); ns.style.color = cat.color; ns.textContent = cat.label;
    info.appendChild(nb); info.appendChild(ns);
    row.appendChild(info);
  } else {
    const info = document.createElement('div'); info.className = 'winfo';
    const nb = document.createElement('b'); nb.textContent = 'Wahltag';
    const ns = document.createElement('span'); ns.style.color = 'var(--l2)'; ns.textContent = 'noch offen';
    info.appendChild(nb); info.appendChild(ns);
    row.appendChild(info);
  }

  /* Status: bei vergangenen Tagen per Tipp umschaltbar (mit Bestätigung).
     done und skip wechseln direkt; ein Zurücksetzen auf offen gibt es
     nicht mehr (JB 07-05). */
  const st = document.createElement('div'); st.className = 'wstat';
  if (unit.status){
    const sb = document.createElement('button');
    sb.className = unit.status === 'done' ? 'st-done' : 'st-skip';
    sb.innerHTML = unit.status === 'done' ? svgStroke('check', 20, 4) : svgStroke('x', 17, 4.2);
    if (unit.kind === 'choice'){
      /* Wahltag: kein direkter done/skip-Toggle — der Zeilen-Klick verlangt
         zuerst die Trainingswahl (JB 07-05). Klick faellt zur Zeile durch. */
      sb.style.pointerEvents = 'none';
    } else if (i < todayIdx()){
      const toSkip = unit.status === 'done';
      sb.setAttribute('aria-label', toSkip ? 'Als nicht gemacht markieren' : 'Als erledigt markieren');
      sb.onclick = async (e) => {
        e.stopPropagation();
        if (!toSkip && !unitTraining(unit)){
          /* Ohne gewaehltes Training gibt es kein Erledigt (calcProgress
             braucht chosen): Einheit wieder oeffnen und im Dialog
             Training waehlen oder mit X bestaetigen. */
          unit.status = null; saveWeek();
          renderWeekView(); renderProgress(); updateBadges();
          showReminderDialog();
          return;
        }
        const ok = toSkip
          ? await confirmDialog('Als nicht gemacht markieren?', '', 'Nicht gemacht', true)
          : await confirmDialog('Als erledigt markieren?', '', 'Erledigt', false);
        if (!ok) return;
        unit.status = toSkip ? 'skip' : 'done'; saveWeek();
        renderWeekView(); renderProgress(); updateBadges();
      };
    } else {
      /* heute/zukuenftig: reine Anzeige, kein toter fokussierbarer Knopf */
      sb.disabled = true;
      sb.setAttribute('aria-label', unit.status === 'done' ? 'Erledigt' : 'Nicht gemacht');
    }
    st.appendChild(sb);
  }
  row.appendChild(st);

  if (d.units.length > 1){
    const badge = document.createElement('button'); badge.className = 'stackbadge';
    badge.textContent = 'x' + d.units.length;
    badge.setAttribute('aria-label','Trainings durchschalten');
    badge.onclick = (e) => { e.stopPropagation(); d.cycle++; saveWeek(); renderWeekView(); if (i === todayIdx()) showToday(); };
    row.appendChild(badge);
  }

  /* Offene Wahltag-Bewertung: rotes Badge oben rechts, Klick öffnet den Dialog */
  if (i < todayIdx()){
    /* gleiche Regel wie missedUnits(): alles ohne Status zaehlt, damit
       Tab-Badge und Zeilen-Badge nie auseinanderlaufen (z. B. nach einem
       Verschieben in die Vergangenheit mitten in der Session) */
    const open = d.units.filter(u => !u.status).length;
    if (open){
      const ob = document.createElement('span');
      ob.className = 'openbadge' + (d.units.length > 1 ? ' shift' : '');
      ob.textContent = String(open);
      row.appendChild(ob);
      row.addEventListener('click', () => { if (dragMoved) return; showReminderDialog(); });
      row._hasOpenClick = true;
    }
  }

  /* Wahltag nachträglich ändern (JB 07-05): Tipp auf eine Wahltag-Zeile mit
     bereits gewähltem Training setzt Wahl und Bewertung zurück — der Tag
     erscheint wieder als offener Punkt (Badge/Dialog). */
  if (!row._hasOpenClick && unit.kind === 'choice' && (unit.chosen || unit.status)){
    row.addEventListener('click', async () => {
      if (dragMoved) return;
      /* Ohne Erklärsatz (JB 07-19, Build 11) — der Titel reicht */
      const ok = await confirmDialog('Training neu wählen?', '', 'Neu wählen', false);
      if (!ok) return;
      unit.chosen = null; unit.status = null; saveWeek();
      renderWeekView(); renderProgress(); updateBadges();
      if (i === todayIdx()) showToday();
      else showReminderDialog(); /* dort: zuerst Training waehlen, dann Haken/X */
    });
  }

  attachDrag(row, i);
  return row;
}

/* Drag & Drop (Spec 7.2, überarbeitet JB 07-12): flüssig & eindeutig.
   – Globales Schloss: immer nur EINE Karte gleichzeitig ziehbar, Zweit-
     finger werden ignoriert (vorher konnten parallele Drags einander die
     Startwerte überschreiben und mehrere Kacheln zugleich bewegen).
   – Aktivierung nach kurzem Halten (180 ms) oder klarem vertikalem Zug;
     ab Aktivierung wird touchmove abgefangen, damit iOS die Geste nicht
     als Scrollen/Gummiband übernimmt und den Drag per pointercancel
     abbricht (das war das «Hängen»).
   – Bewegung über einen rAF-Loop mit einmalig vermessenen Zonen (keine
     Layout-Reads pro Frame) — die Karte klebt ruckelfrei am Finger.
   – Die Ziel-Zonen decken die Liste lückenlos ab: Mitte einer Kachel =
     stapeln (weisser Rahmen), alles andere = nächstliegende Lücke
     (weisser Strich). Der Strich GLEITET animiert zur Lücke, eine kleine
     Hysterese verhindert Flackern an den Zonengrenzen — der Indikator
     steht immer ruhig dort, wo die Karte abgelegt würde.
   Ziel-Arten wie gehabt: Stapeln und Einfügen (Tage rotieren);
   Undo über Schnappschüsse. */
let dragMoved = false;
const weekDrag = { owner:null, active:false, cancel:null }; /* globales Drag-Schloss */
function snapshotDays(){
  return JSON.parse(JSON.stringify(week.days));
}
function pushMove(label){
  week.moves.push({ label, before: snapshotDays() });
  if (week.moves.length > 25) week.moves.shift(); /* Undo-Verlauf begrenzen (Speicher) */
}
function ensureInsertLine(){
  let l = weekList.querySelector('.insert-line');
  if (!l){ l = document.createElement('div'); l.className = 'insert-line'; weekList.appendChild(l); }
  return l;
}
function attachDrag(row, fromIdx){
  const unit = frontUnit(fromIdx);
  if (!unit) return;

  const HOLD_MS = 180, HYST = 6;
  let pid = null, pending = false, dragging = false;
  let startX = 0, startY = 0, lastY = 0, baseY = 0, baseScroll = 0;
  let holdTimer = null, rafId = 0, liftEl = null;
  let listR = null, zones = null, gapYs = null;
  let target = null, curZi = -1, outlined = null, lineShown = false;

  function clearHold(){ if (holdTimer){ clearTimeout(holdTimer); holdTimer = null; } }
  function abortPending(){ clearHold(); pending = false; pid = null; if (weekDrag.owner === row) weekDrag.owner = null; }

  /* Zonen einmal beim Anheben vermessen (Content-Koordinaten der Liste).
     Mitte einer Kachel (34–66 %) = stapeln, alles andere gehört zur
     nächstliegenden Lücke — keine toten Bereiche. */
  function buildZones(){
    const sc = weekList.scrollTop;
    const rows = [...weekList.querySelectorAll('.wrow')]
      .filter(r => r !== liftEl && r.dataset.day !== undefined)
      .map(r => {
        const rc = r.getBoundingClientRect();
        return { el: r, i: parseInt(r.dataset.day, 10),
                 top: rc.top - listR.top + sc, bot: rc.bottom - listR.top + sc };
      })
      .sort((a, b) => a.i - b.i);
    gapYs = [];
    rows.forEach((r, k) => {
      const prev = rows[k - 1];
      gapYs.push(prev ? (prev.bot + r.top) / 2 : r.top - 6);
    });
    if (rows.length) gapYs.push(rows[rows.length - 1].bot + 6);
    zones = [];
    rows.forEach(r => {
      const h = r.bot - r.top;
      if (!liftEl && r.i === fromIdx){
        /* eigene (liegende) Kachel: obere Hälfte → eigene Lücke, untere
           Hälfte fällt in die Folgezone — beides heisst «kehrt zurück» */
        zones.push({ y: r.top + h / 2, target: { gap: r.i } });
      } else {
        zones.push({ y: r.top + h * 0.34, target: { gap: r.i } });
        zones.push({ y: r.top + h * 0.66, target: { stack: r.i, el: r.el } });
      }
    });
    zones.push({ y: Infinity, target: { gap: rows.length } });
  }
  function updateTarget(y){
    let zi = 0;
    while (zi < zones.length - 1 && y > zones[zi].y) zi++;
    if (zi === curZi) return;
    if (curZi >= 0 && Math.abs(zi - curZi) === 1){
      /* Hysterese: erst wechseln, wenn der Finger klar in der neuen Zone ist */
      const lower = zi > 0 ? zones[zi - 1].y : -Infinity;
      const depth = Math.min(y - lower, zones[zi].y - y);
      if (depth < HYST) return;
    }
    curZi = zi;
    applyTarget(zones[zi].target);
  }
  function applyTarget(t){
    target = t;
    const line = ensureInsertLine();
    if (t.stack !== undefined){
      if (outlined !== t.el){
        if (outlined) outlined.classList.remove('droptarget');
        t.el.classList.add('droptarget');
        outlined = t.el;
      }
      line.classList.remove('show'); lineShown = false;
    } else {
      if (outlined){ outlined.classList.remove('droptarget'); outlined = null; }
      const y = gapYs[Math.min(t.gap, gapYs.length - 1)] - 2.5;
      if (!lineShown){
        /* frisch einblenden: erst positionieren (ohne Gleiten), dann zeigen */
        line.classList.add('jump');
        line.style.transform = 'translateY(' + y + 'px)';
        void line.offsetWidth;
        line.classList.remove('jump');
        line.classList.add('show');
        lineShown = true;
      } else {
        line.style.transform = 'translateY(' + y + 'px)';
      }
    }
  }
  function activate(){
    if (dragging || !pending) return;
    pending = false; clearHold();
    dragging = true; dragMoved = true;
    weekDrag.active = true; weekDrag.cancel = cancelDrag;
    listR = weekList.getBoundingClientRect();
    baseY = lastY; baseScroll = weekList.scrollTop; /* Re-Baseline: kein Sprung beim Anheben */
    const d = week.days[fromIdx];
    if (d.units.length > 1){
      /* Vom Stapel löst sich nur das oberste Training (JB 07-12): ein
         fliegender Klon folgt dem Finger, die Kachel selbst bleibt an Ort
         und Stelle und zeigt sofort die restlichen Trainings. */
      const rowR = row.getBoundingClientRect();
      liftEl = row.cloneNode(true);
      liftEl.querySelectorAll('.stackbadge, .openbadge').forEach(n => n.remove());
      liftEl.classList.remove('today-row');
      liftEl.classList.add('dragging');
      liftEl.style.position = 'absolute';
      liftEl.style.left = (rowR.left - listR.left) + 'px';
      liftEl.style.top = (rowR.top - listR.top + baseScroll) + 'px';
      liftEl.style.width = rowR.width + 'px';
      liftEl.style.height = rowR.height + 'px';
      liftEl.style.margin = '0';
      liftEl.style.pointerEvents = 'none';
      weekList.appendChild(liftEl);
      /* Kachel darunter sofort ohne das gezogene Training zeichnen — rein
         optisch, die Daten bleiben bis zum Loslassen unangetastet */
      const keep = d.units;
      d.units = d.units.filter(u => u.id !== unit.id);
      const fresh = buildWeekRow(fromIdx);
      d.units = keep;
      row.className = fresh.className;
      row.replaceChildren(...[...fresh.childNodes]);
    } else {
      row.classList.add('dragging');
    }
    buildZones();
    curZi = -1; target = null; outlined = null; lineShown = false;
    try { row.setPointerCapture(pid); } catch(err){}
    try { if (navigator.vibrate) navigator.vibrate(8); } catch(err){}
    rafId = requestAnimationFrame(frame);
  }
  function frame(){
    if (!dragging) return;
    /* Auto-Scroll an den Listenrändern (nur wenn die Liste scrollen kann) */
    const maxSc = weekList.scrollHeight - weekList.clientHeight;
    if (maxSc > 0){
      const EDGE = 46, sc0 = weekList.scrollTop;
      if (lastY < listR.top + EDGE && sc0 > 0){
        weekList.scrollTop = Math.max(0, sc0 - Math.min(12, (listR.top + EDGE - lastY) * 0.3));
      } else if (lastY > listR.bottom - EDGE && sc0 < maxSc){
        weekList.scrollTop = Math.min(maxSc, sc0 + Math.min(12, (lastY - (listR.bottom - EDGE)) * 0.3));
      }
    }
    const sc = weekList.scrollTop;
    const dy = (lastY - baseY) + (sc - baseScroll);
    (liftEl || row).style.transform = 'translate3d(0,' + dy + 'px,0) scale(1.02)';
    updateTarget(lastY - listR.top + sc);
    rafId = requestAnimationFrame(frame);
  }
  function finishDrag(cancelled){
    dragging = false;
    cancelAnimationFrame(rafId);
    weekDrag.owner = null; weekDrag.active = false; weekDrag.cancel = null;
    const line = weekList.querySelector('.insert-line');
    if (line) line.classList.remove('show');
    if (outlined){ outlined.classList.remove('droptarget'); outlined = null; }
    const t = cancelled ? null : target;
    const wasLift = !!liftEl;
    if (liftEl){ liftEl.remove(); liftEl = null; }
    row.classList.remove('dragging');
    row.style.transform = ''; /* ohne .dragging greift die .2s-Transition: Karte gleitet zurück */
    target = null; curZi = -1; lineShown = false;
    if (t && t.stack !== undefined && t.stack !== fromIdx){
      stackUnit(unit.id, fromIdx, t.stack);
    } else if (t && t.gap !== undefined && t.gap !== fromIdx && t.gap !== fromIdx + 1){
      insertUnit(unit.id, fromIdx, t.gap);
    } else if (wasLift){
      renderWeekView(); /* nichts (Neues) getroffen: Stapel-Optik zurück */
    }
    setTimeout(() => { dragMoved = false; }, 60);
  }
  function cancelDrag(){
    if (!dragging) return;
    pid = null;
    finishDrag(true);
  }

  row.addEventListener('pointerdown', e => {
    if (weekDrag.owner || pid !== null) return; /* eine Geste zur Zeit */
    if (e.isPrimary === false) return;
    if (e.button !== undefined && e.button > 0) return;
    if (e.target.closest('.stackbadge') || e.target.closest('.wstat') || e.target.closest('.wico-btn')) return;
    weekDrag.owner = row;
    pid = e.pointerId; pending = true; dragMoved = false;
    startX = e.clientX; startY = e.clientY; lastY = e.clientY;
    holdTimer = setTimeout(() => { holdTimer = null; if (pending) activate(); }, HOLD_MS);
  });
  row.addEventListener('pointermove', e => {
    if (e.pointerId !== pid) return;
    lastY = e.clientY;
    if (dragging || !pending) return;
    if (e.buttons !== undefined && e.buttons === 0){ abortPending(); return; } /* verwaist (Maus) */
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy)){ abortPending(); return; }
    /* Maus/Stift aktiviert direkt über Bewegung; Touch läuft über touchmove,
       wo natives Scrollen im richtigen Moment abgefangen werden kann */
    if (e.pointerType !== 'touch' && Math.abs(dy) > 6 && Math.abs(dy) > Math.abs(dx)) activate();
  });
  /* Touch: solange die Geste uns gehört, natives Scrollen unterbinden —
     sonst reisst iOS den Drag mit pointercancel ab («Hängen») */
  row.addEventListener('touchmove', e => {
    if (dragging){
      if (e.cancelable) e.preventDefault();
      else cancelDrag(); /* natives Scrollen hat schon übernommen */
      return;
    }
    if (!pending) return;
    const t0 = e.touches[0]; if (!t0) return;
    const dx = t0.clientX - startX, dy = t0.clientY - startY;
    if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy)){ abortPending(); return; }
    if (Math.abs(dy) > 10 && Math.abs(dy) > Math.abs(dx)){
      if (e.cancelable){ e.preventDefault(); activate(); }
      else abortPending(); /* Scrollen war schneller: sauber loslassen */
    }
  }, { passive: false });
  row.addEventListener('pointerleave', e => {
    if (e.pointerId === pid && pending && !dragging) abortPending();
  });
  const end = e => {
    if (e.pointerId !== pid) return;
    clearHold();
    pid = null;
    if (!dragging){
      if (pending){ pending = false; if (weekDrag.owner === row) weekDrag.owner = null; }
      return;
    }
    finishDrag(e.type === 'pointercancel');
  };
  row.addEventListener('pointerup', end);
  row.addEventListener('pointercancel', end);
}
/* Stapeln: Einheit zum Zieltag dazulegen (Zähler «x2») */
function stackUnit(unitId, from, to){
  const info = unitById(unitId);
  if (!info) return;
  pushMove((unitTraining(info.unit) ? TR[unitTraining(info.unit)].name : 'Wahltag') +
    ': ' + DAY_SHORT[from] + ' auf ' + DAY_SHORT[to] + ' gelegt');
  const src = week.days[from];
  const i = src.units.findIndex(u => u.id === unitId);
  const [u] = src.units.splice(i, 1);
  week.days[to].units.push(u);
  saveWeek();
  renderWeekView(); showToday(); renderProgress(); updateBadges();
}
/* Einfügen in eine Lücke: die Tage dazwischen rutschen um eine Position */
function insertUnit(unitId, from, gap){
  const target = gap <= from ? gap : gap - 1;
  if (target === from) { renderWeekView(); return; }
  const info = unitById(unitId);
  if (!info) return;
  pushMove((unitTraining(info.unit) ? TR[unitTraining(info.unit)].name : 'Wahltag') +
    ': als ' + DAY_SHORT[target] + ' eingefügt');
  const src = week.days[from];
  const i = src.units.findIndex(u => u.id === unitId);
  const [u] = src.units.splice(i, 1);
  const rest = src.units.slice(); /* weitere Einheiten bleiben beim Wochentag */
  const copy = week.days.map(d => ({ units: d.units, cycle: d.cycle }));
  if (target < from){
    for (let d0 = from; d0 > target; d0--){
      week.days[d0].units = copy[d0 - 1].units;
      week.days[d0].cycle = copy[d0 - 1].cycle;
    }
  } else {
    for (let d0 = from; d0 < target; d0++){
      week.days[d0].units = copy[d0 + 1].units;
      week.days[d0].cycle = copy[d0 + 1].cycle;
    }
  }
  week.days[target].units = [u];
  week.days[target].cycle = 0;
  if (rest.length) week.days[from].units = week.days[from].units.concat(rest);
  saveWeek();
  renderWeekView(); showToday(); renderProgress(); updateBadges();
}
function updateUndoBar(){
  const m = week.moves[week.moves.length - 1];
  undoBar.classList.toggle('hidden', !m);
  if (m) undoMsg.textContent = m.label;
}
document.getElementById('undoBtn').onclick = () => {
  const m = week.moves.pop();
  if (!m) return;
  week.days = m.before;
  saveWeek();
  renderWeekView(); showToday(); renderProgress(); updateBadges();
};

/* =====================================================================
   FORTSCHRITT-VIEW · Drei-Farben-Ring + Prozentlinien (Spec 7.3)
   ===================================================================== */
const RING_ORDER = [
  { cat:'cardio', r:100, colVar:'--green',  tint:'var(--green-tint)',  cap:'Cardio' },
  { cat:'kraft',  r:76,  colVar:'--orange', tint:'var(--orange-tint)', cap:'Kraft'  },
  { cat:'flex',   r:52,  colVar:'--blue',   tint:'var(--blue-tint)',   cap:'Flex'   }
];
/* Symbol am Ring-Startpunkt (12 Uhr), wie bei den Apple-Ringen */
const RING_ICON = { cardio:'figure.run', kraft:'figure.strengthtraining.traditional', flex:'figure.flexibility' };
function cssCol(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

/* Batterie-Verlauf wie im Referenz-Screenshot (JB 07-11): am Anfang leicht
   aufgehellt, am Ende leicht ins Dunkle gekippt; Track = Farbe stark
   Richtung Hintergrund gemischt */
function batteryGrad(col, deg){
  return 'linear-gradient(' + deg + 'deg, color-mix(in srgb, ' + col + ' 72%, #FFFFFF), '
       + col + ' 52%, color-mix(in srgb, ' + col + ' 80%, #001A26))';
}
function batteryTrack(col){
  return 'color-mix(in srgb, ' + col + ' 26%, var(--bg))';
}
/* Wie viele Segmente leuchten: >0 % zeigt mindestens eins, unter 100 %
   bleibt mindestens eins dunkel — voll sieht nur voll aus */
function litSegs(n, pct){
  if (pct <= 0) return 0;
  if (pct >= 100) return n;
  return Math.min(n - 1, Math.max(1, Math.round(n * pct / 100)));
}

function renderProgress(){
  const mon = mondayOf(today()), sun = dateOfDay(6);
  document.getElementById('progRange').textContent = 'Diese Woche · ' + fmtDate(mon) + ' – ' + fmtDate(sun);
  const p = calcProgress();

  /* Ansicht laut prefs: Ring (Standard) oder Balken; Knopf-Icon zeigt
     jeweils die ALTERNATIVE Ansicht an (wie beim Theme-Switch-Muster). */
  const view = prefs.progView === 'bars' ? 'bars' : 'ring';
  const tgl = document.getElementById('progToggle');
  tgl.innerHTML = '';
  if (view === 'ring') tgl.appendChild(ico('chart.bar.fill'));
  else tgl.innerHTML = svgStroke('rings', 20, 2.2);
  tgl.setAttribute('aria-label', view === 'ring' ? 'Als Balken anzeigen' : 'Als Ringe anzeigen');

  const svg = document.getElementById('ringSvg');
  const bars = document.getElementById('progBars');
  document.querySelector('#view-progress .pwrap').classList.toggle('bars-mode', view === 'bars');
  svg.style.display = view === 'ring' ? '' : 'none';
  bars.style.display = view === 'bars' ? '' : 'none';
  svg.innerHTML = '';
  bars.innerHTML = '';

  if (view === 'bars'){
    /* Balken-Ansicht im Apple-Stil: feine gepunktete Referenzlinien mit
       Prozent-Skala, schlanke Säulen mit runder Kappe auf einer festen
       Grundlinie, Wert über der Säule, Label und Zähler darunter.
       Bei 0 Prozent steht «0 %» — nie ein Strich (JB 07-05). */
    const chart = document.createElement('div'); chart.className = 'abar-chart';
    [100, 75, 50, 25].forEach(gp => {
      const g = document.createElement('div'); g.className = 'abar-grid';
      g.style.bottom = gp + '%';
      const gl = document.createElement('span'); gl.className = 'abar-glabel';
      gl.textContent = gp + ' %';
      g.appendChild(gl);
      chart.appendChild(g);
    });
    const baseLine = document.createElement('div'); baseLine.className = 'abar-base';
    chart.appendChild(baseLine);
    const rowEl = document.createElement('div'); rowEl.className = 'abar-row';
    const foot = document.createElement('div'); foot.className = 'abar-foot';
    RING_ORDER.forEach(rd => {
      const cat = CATS[rd.cat], data = p[rd.cat];
      const pct = data.total ? Math.round(100 * data.done / data.total) : 0;
      const colWrap = document.createElement('div'); colWrap.className = 'abar-col';
      const bar = document.createElement('div'); bar.className = 'abar-bar';
      bar.style.background = cat.color;
      bar.style.height = pct + '%';
      colWrap.appendChild(bar);
      const pv = document.createElement('div'); pv.className = 'abar-pct';
      pv.style.color = cat.color;
      pv.style.bottom = 'calc(' + pct + '% + 6px)';

  } else {

  const lines = document.getElementById('progLines');

  RING_ORDER.forEach(rd => {

/* Bar-Position: fix per CSS (bottom:16px). Die fruehere JS-Selbstkalibrierung ist raus,
   weil die wahre Ursache der schwebenden Bar der iOS-26-black-translucent-Bug war
   (Fenster ~60px kuerzer als der Bildschirm, Streifen unten unerreichbar) und der
   jetzt ueber das Statusbar-Meta im <head> behoben ist. */

/* ---- Indicator-Pille: liegt hinter dem aktiven Tab, gleitet bei Wechsel ---- */
function repositionTabIndicator(animate){
  const bar = document.getElementById('tabbar');
  const ind = bar && bar.querySelector('.tab-indicator');
  if (!bar || !ind) return;
  const act = bar.querySelector('.tab.act') || bar.querySelector('.tab');
  if (!act) return;
  const barR = bar.getBoundingClientRect();
  const btnR = act.getBoundingClientRect();
  if (!btnR.width) return;              /* Layout noch nicht bereit (z. B. jsdom) */
  if (!animate) bar.classList.add('no-anim');
  /* Indicator ragt 2.5px je Seite ueber den Button hinaus: Randabstand zur Bar = 2.5px statt 5px */
  ind.style.transform = 'translateX(' + (btnR.left - barR.left - 2.5) + 'px)';
  ind.style.width = (btnR.width + 5) + 'px';
  if (!animate){
    void ind.offsetWidth;
    requestAnimationFrame(() => bar.classList.remove('no-anim'));
  }
}

/* ---- Drag: Finger horizontal ueber die Bar zieht die Pille mit ---- */
(function(){
  const bar = document.getElementById('tabbar');
  const ind = bar && bar.querySelector('.tab-indicator');
  if (!bar || !ind) return;
  const DRAG_THRESHOLD = 6;
  let down = false, dragging = false, vlock = false, suppressClick = false;
  let startX = 0, startY = 0, tpid = null; /* nur ein Finger steuert die Pille */

  const btns = () => Array.from(bar.querySelectorAll('.tab'));

  function followFinger(clientX){
    const bs = btns();
    if (!bs.length) return;
    const barR = bar.getBoundingClientRect();
    const firstR = bs[0].getBoundingClientRect();
    const lastR = bs[bs.length - 1].getBoundingClientRect();
    const w = firstR.width;
    if (!w) return;
    const center = Math.max(firstR.left + w / 2, Math.min(lastR.left + w / 2, clientX));
    ind.style.transform = 'translateX(' + (center - w / 2 - barR.left - 2.5) + 'px)';
    ind.style.width = (w + 5) + 'px';
  }
  function nearestBtn(clientX){
    let best = null, bestD = Infinity;
    btns().forEach(b => {
      const r = b.getBoundingClientRect();
      const d = Math.abs(clientX - (r.left + r.width / 2));
      if (d < bestD){ bestD = d; best = b; }
    });
    return best;
  }

  bar.addEventListener('pointerdown', e => {
    if (e.button !== undefined && e.button !== 0) return;
    if (down || weekDrag.active) return; /* Zweitfinger / laufender Karten-Drag */
    down = true; dragging = false; vlock = false; suppressClick = false;
    tpid = e.pointerId;
    startX = e.clientX; startY = e.clientY;
    /* Kein setPointerCapture hier: Capture wuerde den Klick auf die Bar
       umleiten und plain Taps auf die Tab-Buttons schlucken. */
  });
  bar.addEventListener('pointermove', e => {
    if (!down || vlock || e.pointerId !== tpid) return;
    if (e.buttons !== undefined && e.buttons === 0){ down = false; return; } /* verwaister Zustand */
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (!dragging){
      if (Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx)){ vlock = true; return; }
      if (Math.abs(dx) <= DRAG_THRESHOLD) return;
      dragging = true; bar.classList.add('is-dragging');
      try{ bar.setPointerCapture(e.pointerId); }catch(err){} /* erst jetzt: Drag laeuft */
    }
    if (e.cancelable) e.preventDefault();
    followFinger(e.clientX);
  });
  function endDrag(e){
    if (!down || e.pointerId !== tpid) return;
    down = false; tpid = null;
    if (!dragging) return;               /* plainer Tap: Klick-Handler uebernimmt */
    dragging = false; bar.classList.remove('is-dragging');
    suppressClick = true;                /* Folge-Klick des Drags nicht als Tap werten */
    const t = nearestBtn(e.clientX);
    if (t && !t.classList.contains('act')) switchTab(t.dataset.tab);
    else repositionTabIndicator(true);   /* zurueckschnappen */
  }
  bar.addEventListener('pointerup', endDrag);
  bar.addEventListener('pointercancel', endDrag);
  bar.addEventListener('click', e => {
    if (suppressClick){ suppressClick = false; e.preventDefault(); e.stopPropagation(); }
  }, true);

  requestAnimationFrame(() => repositionTabIndicator(false));
  window.addEventListener('resize', () => repositionTabIndicator(false));
})();
</script>

const alertWrap = document.getElementById('alertWrap');
function confirmDialog(title, msg, okLabel, destructive){
  return new Promise(resolve => {
    alertWrap.innerHTML = '';
    const box = document.createElement('div'); box.className = 'alert' + (destructive ? ' destr' : '');
    const head = document.createElement('div'); head.className = 'ahead';
    const h = document.createElement('h3'); h.textContent = title; head.appendChild(h);
    /* Erklärsatz nur, wo einer übergeben wird — die Status-Dialoge
       kommen ohne aus (Build 10) */
    if (msg){ const p = document.createElement('p'); p.textContent = msg; head.appendChild(p); }
    box.appendChild(head);
    const row = document.createElement('div'); row.className = 'arow';
    const c = document.createElement('button'); c.className = 'a-cancel'; c.textContent = 'Abbrechen';
    c.onclick = () => { alertWrap.classList.remove('show'); resolve(false); };
    const ok = document.createElement('button'); ok.className = 'a-ok' + (destructive ? ' destructive' : '');

    ok.onclick = () => { alertWrap.classList.remove('show'); resolve(true); };
    row.appendChild(c); row.appendChild(ok);
    box.appendChild(row);

    rm.innerHTML = svgStroke('x', 13, 4);
    blk.appendChild(rm);
    const fn = field('Name der Übung', u && u.name);
    const fa = field('Anleitung', u && u.anleitung, true);
    const ft = field('Tipps (eine pro Zeile)', u && u.tipps ? u.tipps.join('\n') : '', true);
    const fq = field('Quell-Link (optional)', u && u.quelle, false, 'https://…');
    blk.appendChild(fn.el); blk.appendChild(fa.el); blk.appendChild(ft.el); blk.appendChild(fq.el);
    rm.onclick = () => blk.remove();
    blk._read = () => ({
      name: fn.inp.value.trim(),
      anleitung: fa.inp.value.trim(),
      tipps: ft.inp.value.split('\n').map(s => s.trim()).filter(Boolean),
      quelle: fq.inp.value.trim() || undefined
    });
    return blk;
  }

  let refs = {};
  function renderForm(){
    formWrap.innerHTML = '';
    bU.classList.toggle('act', typ === 'uebung');
    bT.classList.toggle('act', typ === 'training');
    refs = {};
    if (typ === 'uebung'){
      const src = editing && editing.typ === 'uebung' ? editing : {};
      refs.fn = field('Name der Übung', src.name);
      refs.fa = field('Anleitung', src.anleitung, true);
      refs.ft = field('Tipps (eine pro Zeile)', src.tipps ? src.tipps.join('\n') : '', true);
      refs.fq = field('Quell-Link (optional)', src.quelle, false, 'https://…');
      [refs.fn, refs.fa, refs.ft, refs.fq].forEach(f => formWrap.appendChild(f.el));
    } else {
      const src = editing && editing.typ === 'training' ? editing : {};
      refs.tt = field('Titel des Trainings', src.titel);
      refs.td = field('Dauer', src.dauer, false, 'z. B. 5 Minuten');
      formWrap.appendChild(refs.tt.el); formWrap.appendChild(refs.td.el);
      const cap = document.createElement('div'); cap.className = 'd-cap'; cap.textContent = 'Übungen';
      formWrap.appendChild(cap);
      const list = document.createElement('div'); refs.list = list;
      formWrap.appendChild(list);
      (src.uebungen && src.uebungen.length ? src.uebungen : [null]).forEach(u => list.appendChild(uebungBlock(u)));
      const add = document.createElement('button'); add.className = 'ghost-btn';
      add.textContent = '+ Übung hinzufügen';
      add.onclick = () => list.appendChild(uebungBlock(null));
      formWrap.appendChild(add);
    }
    const err = document.createElement('div'); err.className = 'form-error'; refs.err = err;
    formWrap.appendChild(err);
    const save = document.createElement('button'); save.className = 'primary-btn';
    save.textContent = 'Speichern';
    save.onclick = doSave;
    formWrap.appendChild(save);
    if (editing){
      const del = document.createElement('button'); del.className = 'ghost-btn';
      del.style.color = 'var(--red)';
      del.textContent = 'Eintrag löschen';
      del.onclick = async () => {
        const ok = await confirmDialog('Eintrag löschen?',
          'Der eigene Eintrag wird von diesem Gerät entfernt.', 'Löschen', true);
        if (!ok) return;
        customLib[cat].splice(editIdx, 1); saveLib();
        renderLibRoot(fullpage, cat);
      };
      formWrap.appendChild(del);
    }
  }
  function doSave(){
    refs.err.textContent = '';
    let entry;
    if (typ === 'uebung'){
      const name = refs.fn.inp.value.trim();
      if (!name){ refs.err.textContent = 'Bitte einen Namen angeben.'; return; }
      entry = {
        typ:'uebung', name,
        anleitung: refs.fa.inp.value.trim(),
        tipps: refs.ft.inp.value.split('\n').map(s => s.trim()).filter(Boolean),
        quelle: refs.fq.inp.value.trim() || undefined
      };
    } else {
      const titel = refs.tt.inp.value.trim();
      if (!titel){ refs.err.textContent = 'Bitte einen Titel angeben.'; return; }
      const uebungen = [...refs.list.children].map(b => b._read()).filter(u => u.name);
      if (!uebungen.length){ refs.err.textContent = 'Bitte mindestens eine Übung mit Namen erfassen.'; return; }
      entry = { typ:'training', titel, dauer: refs.td.inp.value.trim(), uebungen };
    }
    if (editing) customLib[cat][editIdx] = entry;
    else customLib[cat].push(entry);
    saveLib();
    renderLibRoot(fullpage, cat);
  }
  bU.onclick = () => { typ = 'uebung'; renderForm(); };
  bT.onclick = () => { typ = 'training'; renderForm(); };
  renderForm();
}
</script>

<script>
'use strict';
/* =====================================================================
   EINSTELLUNGEN (Spec 10) · Plan-Editor, Perioden, Theme, Zurücksetzen
   ===================================================================== */
const PHASE_LABEL = { kraft:'Kraft-Phase', cardio:'Cardio-Phase' };

function planDayLabel(def){
  if (typeof def === 'string' && def.indexOf('choice') === 0){
    return { name:'Wahltag', icon:null, cls:null };
  }
  const tr = TR[def];
  return { name: tr.name, icon: tr.icon, cls: CATS[tr.cat].icoCls };
}
function periodLabel(p){
  return MONTH_NAMES[p.from - 1].slice(0,3) + ' – ' + MONTH_NAMES[p.to - 1].slice(0,3);
}

function openSettings(){
  openSheet(sh => {
    sh.appendChild(sheetHead('Einstellungen'));
    const body = sheetBody(); sh.appendChild(body);
    renderSettings(body);
  });
}
function renderSettings(body){
  body.innerHTML = '';

  const c1 = document.createElement('div'); c1.className = 'set-cap'; c1.textContent = 'Darstellung';
  body.appendChild(c1);
  const g1 = document.createElement('div'); g1.className = 'set-group';
  const r1 = document.createElement('div'); r1.className = 'set-row';
  const l1 = document.createElement('div'); l1.className = 'lab'; l1.textContent = 'Dunkles Design';
  const sw = document.createElement('button'); sw.className = 'switch' + (prefs.theme === 'dark' ? ' on' : '');
  sw.setAttribute('aria-label','Dunkles Design umschalten');
  sw.onclick = () => {
    prefs.theme = prefs.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    sw.classList.toggle('on', prefs.theme === 'dark');
    renderProgress();
  };
  r1.appendChild(l1); r1.appendChild(sw);
  g1.appendChild(r1);
  body.appendChild(g1);

  for (const ph of ['kraft','cardio']){
    const cap = document.createElement('div'); cap.className = 'set-cap';
    cap.textContent = 'Wochenplan · ' + PHASE_LABEL[ph];
    body.appendChild(cap);
    const g = document.createElement('div'); g.className = 'set-group';
    for (let i = 0; i < 7; i++){
      const row = document.createElement('div'); row.className = 'set-row tappable';
      const lab = document.createElement('div'); lab.className = 'lab'; lab.textContent = DAY_NAMES[i];
      const val = document.createElement('div'); val.className = 'val';
      const info = planDayLabel(plan[ph].days[i]);
      if (info.icon) val.appendChild(ico(info.icon, info.cls));
      const vt = document.createElement('span'); vt.textContent = info.name; val.appendChild(vt);
      const ch = document.createElement('span'); ch.className = 'li-chev'; val.appendChild(ch);
      row.appendChild(lab); row.appendChild(val);
      row.onclick = () => openDayPicker(ph, i);
      g.appendChild(row);
    }
    body.appendChild(g);
  }

  const c3 = document.createElement('div'); c3.className = 'set-cap'; c3.textContent = 'Perioden (Monate pro Phase)';
  body.appendChild(c3);
  const v = validatePeriods(plan);
  if (!v.ok){
    const warn = document.createElement('div'); warn.className = 'warnbox';
    let msg = 'Die Perioden decken das Jahr nicht sauber ab.';
    if (v.missing.length) msg += ' Ohne Phase: ' + v.missing.join(', ') + '.';
    if (v.overlap.length) msg += ' Doppelt belegt: ' + v.overlap.join(', ') + '.';
    warn.textContent = msg;
    body.appendChild(warn);
  }
  const g3 = document.createElement('div'); g3.className = 'set-group';
  for (const ph of ['kraft','cardio']){
    plan[ph].periods.forEach((p, pi) => {
      const row = document.createElement('div'); row.className = 'set-row tappable';
      const lab = document.createElement('div'); lab.className = 'lab';
      lab.textContent = PHASE_LABEL[ph] + ' · Periode ' + (pi + 1);
      const val = document.createElement('div'); val.className = 'val';
      const vt = document.createElement('span'); vt.textContent = periodLabel(p); val.appendChild(vt);
      const ch = document.createElement('span'); ch.className = 'li-chev'; val.appendChild(ch);
      row.appendChild(lab); row.appendChild(val);
      row.onclick = () => openPeriodPicker(ph, pi);
      g3.appendChild(row);
    });
  }
  body.appendChild(g3);

  const c4 = document.createElement('div'); c4.className = 'set-cap'; c4.textContent = 'Zurücksetzen';
  body.appendChild(c4);
  const g4 = document.createElement('div'); g4.className = 'set-group';

  const rw = document.createElement('div'); rw.className = 'set-row tappable';
  const rwl = document.createElement('div'); rwl.className = 'lab'; rwl.textContent = 'Woche auf Vorlage zurücksetzen';
  rw.appendChild(rwl);
  rw.onclick = async () => {
    const ok = await confirmDialog('Woche zurücksetzen?',
      'Abhaken, Wahltag-Entscheide und Verschiebungen dieser Woche gehen verloren.', 'Zurücksetzen', true);
    if (!ok) return;
    week = newWeek(); saveWeek();
    autoResolvePast(); /* sonst erscheinen vergangene fixe Tage als offen */
    showToday(); renderWeekView(); renderProgress(); updateBadges();
    closeSheet();
  };
  g4.appendChild(rw);

  const rp = document.createElement('div'); rp.className = 'set-row tappable';
  const rpl = document.createElement('div'); rpl.className = 'lab'; rpl.textContent = 'Plan auf Standard zurücksetzen';
  rp.appendChild(rpl);
  rp.onclick = async () => {
    const ok = await confirmDialog('Plan zurücksetzen?',
      'Beide Wochen-Vorlagen und die Perioden kehren zum Standard zurück. Die laufende Woche bleibt unverändert.', 'Zurücksetzen', true);
    if (!ok) return;
    plan = JSON.parse(JSON.stringify(DEFAULT_PLAN)); savePlan();
    renderSettings(body);
  };
  g4.appendChild(rp);

  const rd = document.createElement('div'); rd.className = 'set-row tappable destructive';
  const rdl = document.createElement('div'); rdl.className = 'lab'; rdl.textContent = 'Alle App-Daten löschen';
  rd.appendChild(rdl);
  rd.onclick = async () => {
    const ok = await confirmDialog('Alle Daten löschen?',
      'Plan, Woche, eigene Übungen und Einstellungen dieser App werden gelöscht (nur sportapp_v1, V4-Daten bleiben unberührt).', 'Alles löschen', true);
    if (!ok) return;
    Object.values(K).forEach(k => { try { localStorage.removeItem(k); } catch(e){} });
    plan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
    prefs = { theme:'dark' }; applyTheme();
    customLib = { cardio:[], kraft:[], flex:[] };
    week = newWeek(); saveWeek();
    autoResolvePast(); /* sonst erscheinen vergangene fixe Tage als offen */
    showToday(); renderWeekView(); renderProgress(); updateBadges();
    closeSheet();
  };
  g4.appendChild(rd);
  body.appendChild(g4);

  const note = document.createElement('div'); note.className = 'pl-none';
  note.style.padding = '12px 2px 6px';
  note.textContent = 'Änderungen an Vorlage und Perioden greifen ab der nächsten Woche; die laufende Woche behält ihren Stand.';
  body.appendChild(note);

  /* Versionszeile: zeigt, welcher Stand wirklich laeuft (Cache-Diagnose) */
  const ver = document.createElement('div'); ver.className = 'pl-none';
  ver.style.padding = '0 2px 2px';
  ver.textContent = APP_BUILD;
  body.appendChild(ver);

  /* Diagnosezeile: misst, was das Geraet der App meldet (fuer Layout-Fehlersuche) */
  const diag = document.createElement('div'); diag.className = 'pl-none';
  diag.style.padding = '0 2px 8px';
  try{
    const probe = document.createElement('div');
    probe.style.cssText = 'position:fixed;left:-9999px;height:env(safe-area-inset-bottom,0px)';
    document.body.appendChild(probe);
    const sab = Math.round(probe.getBoundingClientRect().height);
    probe.remove();
    const standalone = (navigator.standalone === true) ||
      (window.matchMedia && matchMedia('(display-mode: standalone)').matches);
    const barB = document.getElementById('tabbar').style.bottom || '16px (CSS)';
    diag.textContent = 'Diagnose: Display ' + ((window.screen && screen.height) || '?') +
      ' · Fenster ' + window.innerHeight + ' · SafeArea ' + sab +
      ' · Bar ' + barB + ' · ' + (standalone ? 'Vollbild-App' : 'Browser');
  }catch(e){ diag.textContent = 'Diagnose nicht verfuegbar'; }
  body.appendChild(diag);
}
function backToSettings(){
  sheet.innerHTML = '';
  const grab = document.createElement('div'); grab.className = 'sh-grab'; sheet.appendChild(grab);
  sheet.appendChild(sheetHead('Einstellungen'));
  const body = sheetBody(); sheet.appendChild(body);
  renderSettings(body);
}

/* Tag-Auswahl im Plan-Editor: X links führt zu den Einstellungen zurück */
function openDayPicker(ph, dayIdx){
  /* Trainingswahl übers Wecker-Rad statt Options-Liste (JB 07-06) */
  sheet.innerHTML = '';
  const grab = document.createElement('div'); grab.className = 'sh-grab'; sheet.appendChild(grab);
  sheet.appendChild(sheetHead(DAY_NAMES[dayIdx] + ' · ' + PHASE_LABEL[ph], backToSettings));
  const body = sheetBody(); sheet.appendChild(body);
  body.style.display = 'flex'; body.style.flexDirection = 'column'; body.style.alignItems = 'center';

  const current = plan[ph].days[dayIdx];
  const choiceKey = (dayIdx === 5 || dayIdx === 6) && ph === 'kraft' ? 'choice:wknd' : 'choice:tue';
  const entries = [
    ...Object.keys(TR).map(k => ({ k, label: TR[k].name, icon: TR[k].icon, cls: CATS[TR[k].cat].icoCls })),
    { k: choiceKey, label: 'Wahltag' }
  ];
  const curKey = String(current).indexOf('choice') === 0 ? choiceKey : current;

  const picked = document.createElement('div'); picked.className = 'wheel-picked';
  const nameOf = k => k.indexOf('choice') === 0 ? 'Wahltag' : TR[k].name;
  const wheel = buildWheel(entries, k => {
    picked.innerHTML = 'Gewählt: <b>' + nameOf(k) + '</b>';
  }, curKey);
  body.appendChild(wheel.el);
  body.appendChild(picked);

  const conf = document.createElement('button'); conf.className = 'confirm-btn';
  conf.setAttribute('aria-label','Übernehmen');
  conf.innerHTML = svgStroke('check', 26, 4.2);
  conf.onclick = () => {
    plan[ph].days[dayIdx] = wheel.selected();
    savePlan();
    backToSettings();
  };
  body.appendChild(conf);
}

/* Perioden-Editor: von/bis Monat über zwei Räder; X links = zurück */
function openPeriodPicker(ph, pi){
  sheet.innerHTML = '';
  const grab = document.createElement('div'); grab.className = 'sh-grab'; sheet.appendChild(grab);
  sheet.appendChild(sheetHead(PHASE_LABEL[ph] + ' · Periode ' + (pi + 1), backToSettings));
  const body = sheetBody(); sheet.appendChild(body);

  const p = plan[ph].periods[pi];
  let selFrom = p.from, selTo = p.to;

  const wrap = document.createElement('div'); wrap.className = 'periodrow-wheels';
  wrap.appendChild(monthWheel('Von', selFrom, v => { selFrom = v; preview(); }));
  wrap.appendChild(monthWheel('Bis', selTo, v => { selTo = v; preview(); }));
  body.appendChild(wrap);

  const prev = document.createElement('div'); prev.className = 'pl-none'; prev.style.textAlign = 'center';
  body.appendChild(prev);
  const warn = document.createElement('div'); body.appendChild(warn);

  function preview(){
    prev.textContent = MONTH_NAMES[selFrom-1] + ' bis ' + MONTH_NAMES[selTo-1];
    const test = JSON.parse(JSON.stringify(plan));
    test[ph].periods[pi] = { from:selFrom, to:selTo };
    const v = validatePeriods(test);
    warn.innerHTML = '';
    if (!v.ok){
      const w = document.createElement('div'); w.className = 'warnbox';
      let msg = 'Achtung: So decken die Perioden das Jahr nicht sauber ab.';
      if (v.missing.length) msg += ' Ohne Phase: ' + v.missing.join(', ') + '.';
      if (v.overlap.length) msg += ' Doppelt: ' + v.overlap.join(', ') + '.';
      w.textContent = msg;
      warn.appendChild(w);
    }
  }
  preview();

  const save = document.createElement('button'); save.className = 'primary-btn';
  save.textContent = 'Übernehmen';
  save.onclick = async () => {
    const test = JSON.parse(JSON.stringify(plan));
    test[ph].periods[pi] = { from:selFrom, to:selTo };
    const v = validatePeriods(test);
    if (!v.ok){
      const ok = await confirmDialog('Trotzdem übernehmen?',
        'Die Monatsabdeckung ist unvollständig oder überlappend. Die App nutzt dann für unklare Monate die Standard-Zuordnung.',
        'Übernehmen', false);
      if (!ok) return;
    }
    plan[ph].periods[pi] = { from:selFrom, to:selTo };
    savePlan();
    backToSettings();
  };
  body.appendChild(save);

  function monthWheel(cap, initial, onChange){
    const col = document.createElement('div');
    const c = document.createElement('div'); c.className = 'pw-cap'; c.textContent = cap;
    col.appendChild(c);
    const entries = MONTH_NAMES.map((mn, i) => ({ k: String(i + 1), label: mn.slice(0, 3) }));
    const wheel = buildWheel(entries, k => onChange(parseInt(k, 10)), String(initial));
    wheel.el.style.width = '100%';
    col.appendChild(wheel.el);
    return col;
  }
}
document.getElementById('settingsBtn').onclick = openSettings;

/* =====================================================================
   ERINNERUNG (Spec 7.4, JB 07-05): zentrierter Dialog, nicht wegklickbar,
   bis jeder offene Wahltag bewertet ist. Statt der alten Topbar-Pill
   zeigen rote Badges (Woche-Tab und Wochen-Zeile) offene Bewertungen;
   Klick auf eine offene Wochen-Zeile öffnet den Dialog wieder.
   ===================================================================== */
const remWrap = document.getElementById('remWrap');

function missedUnits(){
  const list = [];
  for (let i = 0; i < todayIdx(); i++){
    week.days[i].units.forEach(u => { if (!u.status) list.push({ unit:u, day:i }); });
  }
  return list;
}
function updateBadges(){
  const n = missedUnits().length;
  const badge = document.querySelector('.tab[data-tab="week"] .tab-badge');
  if (badge){
    badge.hidden = n === 0;
    if (n > 0) badge.textContent = String(n);
  }
}

/* «Offene Wahltage» im A5-Layout (Design-Katalog 07-19, Build 10): ein Tag
   pro Ansicht mit grossem Trainings-Icon; bei mehreren offenen Tagen kommt
   nach Haken/X automatisch der nächste (Zähler in der Caption).
   Pflicht-Dialog: schliesst erst, wenn alle Tage bewertet sind. */
let remTotal = 0, remStep = 0;
function showReminderDialog(){
  if (!missedUnits().length){ updateBadges(); return; }
  remTotal = missedUnits().length; remStep = 1;
  remWrap.classList.add('show');
  renderReminderStep();
  updateBadges();
}
function renderReminderStep(){
  const missed = missedUnits();
  if (!missed.length){
    remWrap.classList.remove('show');
    showToday(); renderWeekView(); renderProgress(); updateBadges();
    return;
  }
  const { unit, day } = missed[0];
  remWrap.innerHTML = '';
  const box = document.createElement('div'); box.className = 'rembox';
  const h = document.createElement('h3'); h.textContent = 'Offene Wahltage'; box.appendChild(h);
  const cap = document.createElement('div'); cap.className = 'rem-cap';
  cap.textContent = DAY_NAMES[day] + ', ' + fmtDate(dateOfDay(day)) +
    (remTotal > 1 ? ' · ' + remStep + ' von ' + remTotal : '');
  box.appendChild(cap);

  /* Grosser Trainings-Kreis: leer mit «?», bis ein Training feststeht */
  const t0 = unitTraining(unit);
  const big = document.createElement('div');
  big.className = 'rem-big' + (t0 ? '' : ' empty');
  if (t0) big.appendChild(ico(TR[t0].icon, CATS[TR[t0].cat].icoCls));
  box.appendChild(big);

  const isChoice = unit.kind === 'choice';
  let yes; /* Pills schalten den Haken scharf, darum vorab deklariert */
  if (isChoice){
    /* Pills immer sichtbar (gewählte markiert), Umwählen jederzeit möglich */
    const pills = document.createElement('div'); pills.className = 'rem-pills';
    CHOICE[unit.opts].forEach(k => {
      const p = document.createElement('button');
      p.className = 'rem-pill' + (unit.chosen === k ? ' act' : '');
      p.appendChild(ico(TR[k].icon));
      const sp = document.createElement('span'); sp.textContent = TR[k].name; p.appendChild(sp);
      p.onclick = () => {
        unit.chosen = k; saveWeek();
        [...pills.children].forEach(x => x.classList.remove('act'));
        p.classList.add('act');
        big.classList.remove('empty');
        big.innerHTML = ''; big.appendChild(ico(TR[k].icon, CATS[TR[k].cat].icoCls));
        /* Haken sofort scharf schalten: grau wird blau */
        yes.classList.add('on');
        yes.disabled = false;
      };
      pills.appendChild(p);
    });
    box.appendChild(pills);
  }

  const acts = document.createElement('div'); acts.className = 'rem-acts';
  const no = document.createElement('button'); no.className = 'rem-btn no';
  no.setAttribute('aria-label','Nicht gemacht');
  no.innerHTML = svgStroke('x', 22, 4.2);
  yes = document.createElement('button');
  yes.className = 'rem-btn yes' + (t0 ? ' on' : '');
  yes.setAttribute('aria-label','Erledigt');
  yes.disabled = isChoice && !unit.chosen;
  yes.innerHTML = svgStroke('check', 22, 4);
  acts.appendChild(no); acts.appendChild(yes);
  box.appendChild(acts);
  remWrap.appendChild(box);

  function mark(status){
    unit.status = status; saveWeek();
    remStep++;
    showToday(); renderWeekView(); renderProgress(); updateBadges();
    renderReminderStep();
  }
  /* X geht immer, auch ohne gewähltes Training: der Tag zählt dann
     bewusst in keiner Kategorie (konsistent mit calcProgress) */
  no.onclick = () => mark('skip');
  /* Haken erst, wenn ein Training gewählt wurde */
  yes.onclick = () => { if (isChoice && !unit.chosen) return; mark('done'); };
}

/* Trainings-Umwahl für feste Tage (Build 10): Tipp aufs Icon in der
   Wochenzeile, nur bei offenen Tagen (heute oder später). Gleiche A5-
   Optik wie der Wahltage-Dialog, aber mit allen sechs Trainings und ohne
   X — Abbruch durch Tippen neben den Dialog. Gilt wie das Drag-Umplanen
   nur für die aktuelle Woche; dauerhaft ändert der Plan-Editor. */
const swapWrap = document.getElementById('swapWrap');
swapWrap.addEventListener('click', e => {
  if (e.target === swapWrap) swapWrap.classList.remove('show');
});
function openSwapDialog(unit, day){
  swapWrap.innerHTML = '';
  const box = document.createElement('div'); box.className = 'rembox';
  const h = document.createElement('h3'); h.textContent = 'Training ändern'; box.appendChild(h);
  const cap = document.createElement('div'); cap.className = 'rem-cap';
  cap.textContent = DAY_NAMES[day] + ', ' + fmtDate(dateOfDay(day));
  box.appendChild(cap);

  let sel = unit.training;
  const big = document.createElement('div'); big.className = 'rem-big';
  const setBig = k => { big.innerHTML = ''; big.appendChild(ico(TR[k].icon, CATS[TR[k].cat].icoCls)); };
  setBig(sel);
  box.appendChild(big);

  const pills = document.createElement('div'); pills.className = 'rem-pills';
  Object.keys(TR).forEach(k => {
    const p = document.createElement('button');
    p.className = 'rem-pill' + (k === sel ? ' act' : '');
    p.appendChild(ico(TR[k].icon));
    const sp = document.createElement('span'); sp.textContent = TR[k].name; p.appendChild(sp);
    p.onclick = () => {
      sel = k;
      [...pills.children].forEach(x => x.classList.remove('act'));
      p.classList.add('act');
      setBig(k);
    };
    pills.appendChild(p);
  });
  box.appendChild(pills);

  const acts = document.createElement('div'); acts.className = 'rem-acts';
  const yes = document.createElement('button'); yes.className = 'rem-btn yes on';
  yes.setAttribute('aria-label','Übernehmen');
  yes.innerHTML = svgStroke('check', 22, 4);
  yes.onclick = () => {
    swapWrap.classList.remove('show');
    if (sel !== unit.training){
      unit.training = sel; saveWeek();
      renderWeekView(); renderProgress(); updateBadges();
      if (day === todayIdx()) showToday();
    }
  };
  acts.appendChild(yes);
  box.appendChild(acts);
  swapWrap.appendChild(box);
  swapWrap.classList.add('show');
}


/* =====================================================================
   START · Auto-Flip beim Tageswechsel, dann Pflicht-Erinnerung
   ===================================================================== */
ensureWeek();
autoResolvePast();
renderWeekView();
renderProgress();

const last = prefs.lastCard;
const isNewDay = last && (last.wk !== week.key || last.day !== todayIdx());
if (isNewDay){
  currentCard = buildSnapshotCard(last);
  stage.appendChild(currentCard);
  setTimeout(() => flipToToday(), 550);
  setTimeout(() => { showReminderDialog(); updateBadges(); }, 1400);
} else {
  showToday();
  showReminderDialog();
  updateBadges();
}

/* =====================================================================
   TAGESWECHSEL OHNE NEUSTART (JB 07-11) · iOS friert die App im
   Hintergrund ein — beim Zurückholen (und jede Minute) prüfen wir
   selbst, ob ein neuer Tag oder eine neue Woche begonnen hat, und
   ziehen Kachel, Woche, Fortschritt und Erinnerung nach. Erzwungenes
   Beenden ist dafür nicht mehr nötig.
   ===================================================================== */
let seenDay = week.key + '#' + todayIdx();
function checkDayChange(){
  const now = weekKeyOf(today()) + '#' + todayIdx();
  if (now === seenDay || flipping) return;
  seenDay = now;
  ensureWeek();            /* legt bei Wochenwechsel die neue Woche an */
  autoResolvePast();
  renderWeekView(); renderProgress(); updateBadges();
  if (currentCard) flipToToday(); else showToday();
  setTimeout(() => { showReminderDialog(); updateBadges(); }, 900);
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden){
    /* Beim Einfrieren alles sichern — so überlebt z. B. die gewählte
       Fortschritts-Ansicht (Ring/Balken) auch ein erzwungenes Beenden */
    saveJSON(K.prefs, prefs); saveWeek();
    return;
  }
  checkDayChange();
});
window.addEventListener('pageshow', checkDayChange);
setInterval(checkDayChange, 60000);
</script>
